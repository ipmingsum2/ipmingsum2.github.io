<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>403 — Not Authorized</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #060914;
      --panel: rgba(14, 22, 41, 0.78);
      --text: #f8fafc;
      --muted: #a8b3c7;
      --line: rgba(255, 255, 255, 0.16);
      --accent: #7c3aed;
      --accent-2: #22d3ee;
      --danger: #fb7185;
      --warning: #fbbf24;
      --success: #34d399;
      --shadow: 0 26px 80px rgba(0, 0, 0, 0.42);
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; margin: 0; user-select: none; }
    body {
      min-height: 100svh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 18% 18%, rgba(124, 58, 237, 0.34), transparent 28rem),
        radial-gradient(circle at 86% 20%, rgba(34, 211, 238, 0.22), transparent 26rem),
        radial-gradient(circle at 50% 96%, rgba(251, 113, 133, 0.2), transparent 30rem),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: grid;
      place-items: center;
      padding: 32px 18px;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.75), transparent 84%);
    }
    main { position: relative; width: min(1080px, 100%); display: grid; grid-template-columns: 1.05fr 0.95fr; gap: 26px; z-index: 1; }
    .card, .status-card { border: 1px solid var(--line); background: linear-gradient(145deg, var(--panel), rgba(15, 23, 42, 0.52)); box-shadow: var(--shadow); backdrop-filter: blur(22px) saturate(1.24); border-radius: 34px; }
    .card { padding: clamp(28px, 5vw, 56px); }
    .eyebrow { display: inline-flex; align-items: center; gap: 10px; margin: 0 0 22px; padding: 9px 13px; border: 1px solid rgba(251, 113, 133, 0.32); border-radius: 999px; background: rgba(251, 113, 133, 0.1); color: #fecdd3; font-size: 0.86rem; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; }
    .pulse { width: 10px; height: 10px; border-radius: 999px; background: var(--danger); animation: pulse 1.8s infinite; }
    h1 { margin: 0; font-size: clamp(3.2rem, 12vw, 8.8rem); line-height: 0.86; letter-spacing: -0.095em; font-weight: 950; }
    h1 span { display: block; background: linear-gradient(120deg, #fff 8%, #c4b5fd 42%, #67e8f9 84%); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .lead { max-width: 58ch; margin: 26px 0 0; color: var(--muted); font-size: clamp(1rem, 2vw, 1.18rem); line-height: 1.75; }
    .actions { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 34px; }
    .button { display: inline-flex; align-items: center; justify-content: center; min-height: 48px; padding: 0 18px; border: 1px solid var(--line); border-radius: 16px; color: var(--text); text-decoration: none; font-weight: 800; }
    .button.primary { border: 0; background: linear-gradient(135deg, var(--accent), var(--accent-2)); }
    .button.secondary { background: rgba(255, 255, 255, 0.07); }
    .status-card { min-height: 540px; padding: 28px; display: flex; flex-direction: column; justify-content: space-between; }
    .error-code { display: grid; place-items: center; aspect-ratio: 1; margin: 8px auto; width: min(320px, 82%); border-radius: 999px; background: radial-gradient(circle, rgba(6, 9, 20, 0.94) 0 54%, transparent 55%), conic-gradient(from 220deg, var(--danger), var(--warning), var(--accent-2), var(--accent), var(--danger)); box-shadow: inset 0 0 58px rgba(255, 255, 255, 0.06), 0 0 90px rgba(124, 58, 237, 0.28); }
    .error-code strong { font-size: clamp(4.4rem, 13vw, 7.8rem); letter-spacing: -0.1em; line-height: 1; }
    .diagnostics { display: grid; gap: 12px; margin: 0; padding: 0; list-style: none; }
    .diagnostics li { display: grid; grid-template-columns: 14px 1fr auto; align-items: center; gap: 12px; padding: 14px; border: 1px solid rgba(255, 255, 255, 0.11); border-radius: 18px; background: rgba(255, 255, 255, 0.055); color: var(--muted); font-size: 0.96rem; }
    .dot { width: 11px; height: 11px; border-radius: 50%; background: var(--success); box-shadow: 0 0 18px currentColor; }
    .dot.warning { background: var(--warning); }
    .dot.danger { background: var(--danger); }
    .tag { color: var(--text); font-size: 0.78rem; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(251, 113, 133, 0.56); } 70% { box-shadow: 0 0 0 11px rgba(251, 113, 133, 0); } 100% { box-shadow: 0 0 0 0 rgba(251, 113, 133, 0); } }
    @media (max-width: 860px) { main { grid-template-columns: 1fr; } .status-card { min-height: auto; gap: 28px; } }
  </style>
</head>
<body>
  <main aria-labelledby="page-title">
    <section class="card">
      <p class="eyebrow"><span class="pulse" aria-hidden="true"></span> HTTP Error 403</p>
      <h1 id="page-title">Not <span>authorized.</span></h1>
      <p class="lead" id="message">
        This area is restricted. You don't have permission to access this content.
      </p>
      <nav class="actions" aria-label="Recovery actions">
        <a class="button primary" href="/">Go home</a>
        <a class="button secondary" href="/socials/discord">Contact support</a>
      </nav>
    </section>

    <aside class="status-card" aria-label="Authorization details">
      <div class="error-code" aria-hidden="true"><strong>403</strong></div>
      <ul class="diagnostics">
        <li><span class="dot danger" aria-hidden="true"></span><span>Access state</span><span class="tag">Denied</span></li>
        <li><span class="dot warning" aria-hidden="true"></span><span>Restriction type</span><span class="tag" id="restrictionType">Unknown</span></li>
        <li><span class="dot" aria-hidden="true"></span><span>Reason</span><span class="tag" id="reasonText">No reason provided</span></li>
      </ul>
    </aside>
  </main>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const type = (params.get('type') || '').toLowerCase();
      const reasonParam = params.get('reason');

      const restrictionTypeEl = document.getElementById('restrictionType');
      const reasonEl = document.getElementById('reasonText');
      const messageEl = document.getElementById('message');

      if (type === 'ban') {
        restrictionTypeEl.textContent = 'Ban';
        reasonEl.textContent = reasonParam && reasonParam.trim() ? reasonParam.trim() : 'No reason provided';
        messageEl.textContent = 'Your account has been banned from this section.';
      } else if (type === 'adminonly') {
        restrictionTypeEl.textContent = 'Admin Only';
        reasonEl.textContent = 'No reason provided';
        messageEl.textContent = 'This section is available to administrators only.';
      } else {
        restrictionTypeEl.textContent = 'Unknown';
        reasonEl.textContent = 'No reason provided';
      }

      if (window.location.search || window.location.hash) {
        window.history.replaceState({}, document.title, window.location.pathname);
      }
    })();
  </script>
</body>
</html>
