    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            margin-top: 0;
            color: #333;
            text-align: center;
        }

        .login-box {
            text-align: center;
        }

        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #5568d3;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .error {
            color: #e74c3c;
            margin-top: 10px;
            font-size: 14px;
        }

        .description {
            color: #e74c3c;
            margin: 15px 0;
            font-size: 14px;
            line-height: 1.6;
        }

        .attempts {
            margin-top: 10px;
            font-size: 14px;
            color: #333;
            font-weight: bold;
        }

        .blocked {
            color: #e74c3c;
            font-size: 16px;
            font-weight: bold;
            margin: 20px 0;
            padding: 15px;
            background-color: #fee;
            border-radius: 5px;
            border: 2px solid #e74c3c;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .warning {
            color: #ff9800;
            font-size: 12px;
            margin-top: 10px;
            padding: 8px;
            background-color: #fff3e0;
            border-radius: 3px;
            border: 1px solid #ff9800;
        }

        .content-box {
            display: none;
        }

        textarea {
            width: 100%;
            min-height: 300px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            resize: vertical;
            box-sizing: border-box;
            background-color: #f8f9fa;
        }
    </style>
</head>

        // ============================================
        // GLOBAL VARIABLES
        // ============================================
        let attemptsLeft = CONFIG.maxAttempts;
        let userIP = null;
        let supabaseClient = null;

        // ============================================
        // SUPABASE INITIALIZATION
        // ============================================
        function initSupabase() {
            try {
                const { createClient } = window.supabase;
                supabaseClient = createClient(CONFIG.supabaseUrl, CONFIG.supabaseAnonKey);
                return true;
            } catch (error) {
                console.error('Error initializing Supabase:', error);
                return false;
            }
        }

        // ============================================
        // IP ADDRESS FUNCTIONS
        // ============================================
        async function getUserIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (error) {
                console.error('Error fetching IP:', error);
                return null;
            }
        }

        // ============================================
        // SUPABASE DATABASE FUNCTIONS
        // ============================================
        async function getIPBlockData(ip) {
            try {
                const { data, error } = await supabaseClient
                    .from('ip_blocks')
                    .select('*')
                    .eq('ip_address', ip)
                    .single();

                if (error && error.code !== 'PGRST116') { // PGRST116 = no rows returned
                    console.error('Error fetching block data:', error);
                    return null;
                }

                return data;
            } catch (error) {
                console.error('Error in getIPBlockData:', error);
                return null;
            }
        }

        async function createIPBlock(ip) {
            try {
                const { data, error } = await supabaseClient
                    .from('ip_blocks')
                    .insert([{
                        ip_address: ip,
                        block_count: 1,
                        blocked_until: new Date(Date.now() + CONFIG.blockDurations[0]).toISOString(),
                        permanent: CONFIG.blockDurations[0] === -1
                    }])
                    .select()
                    .single();

                if (error) {
                    console.error('Error creating block:', error);
                    return null;
                }

                return data;
            } catch (error) {
                console.error('Error in createIPBlock:', error);
                return null;
            }
        }

        async function updateIPBlock(ip, blockCount) {
            try {
                const blockIndex = Math.min(blockCount, CONFIG.blockDurations.length - 1);
                const duration = CONFIG.blockDurations[blockIndex];

                const updateData = {
                    block_count: blockCount + 1,
                    permanent: duration === -1,
                    updated_at: new Date().toISOString()
                };

                if (duration !== -1) {
                    updateData.blocked_until = new Date(Date.now() + duration).toISOString();
                } else {
                    updateData.blocked_until = null;
                }

                const { data, error } = await supabaseClient
                    .from('ip_blocks')
                    .update(updateData)
                    .eq('ip_address', ip)
                    .select()
                    .single();

                if (error) {
                    console.error('Error updating block:', error);
                    return null;
                }

                return data;
            } catch (error) {
                console.error('Error in updateIPBlock:', error);
                return null;
            }
        }

        async function clearIPBlock(ip) {
            try {
                const { error } = await supabaseClient
                    .from('ip_blocks')
                    .delete()
                    .eq('ip_address', ip);

                if (error) {
                    console.error('Error clearing block:', error);
                    return false;
                }

                return true;
            } catch (error) {
                console.error('Error in clearIPBlock:', error);
                return false;
            }
        }

        // ============================================
        // BLOCK CHECKING & MANAGEMENT
        // ============================================
        async function isIPBlocked(ip) {
            const blockData = await getIPBlockData(ip);

            if (!blockData) return { blocked: false };

            // Check if permanently blocked
            if (blockData.permanent) {
                return { blocked: true, permanent: true };
            }

            // Check if still within block period
            if (blockData.blocked_until) {
                const blockedUntil = new Date(blockData.blocked_until);
                const now = new Date();

                if (now < blockedUntil) {
                    return {
                        blocked: true,
                        permanent: false,
                        remainingTime: blockedUntil - now
                    };
                }
            }

            return { blocked: false };
        }

        async function blockIP(ip) {
            const existingBlock = await getIPBlockData(ip);

            let result;
            if (!existingBlock) {
                // First time blocking this IP
                result = await createIPBlock(ip);
            } else {
                // Update existing block
                result = await updateIPBlock(ip, existingBlock.block_count);
            }

            if (!result) {
                return { permanent: false, duration: CONFIG.blockDurations[0] };
            }

            return {
                permanent: result.permanent,
                duration: result.permanent ? -1 : (new Date(result.blocked_until) - Date.now())
            };
        }

        // ============================================
        // UI FUNCTIONS
        // ============================================
        function formatTimeRemaining(ms) {
            const seconds = Math.floor(ms / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);

            if (days > 0) return `${days} day${days > 1 ? 's' : ''}`;
            if (hours > 0) return `${hours} hour${hours > 1 ? 's' : ''} ${minutes % 60} minute${minutes % 60 !== 1 ? 's' : ''}`;
            if (minutes > 0) return `${minutes} minute${minutes > 1 ? 's' : ''}`;
            return `${seconds} second${seconds !== 1 ? 's' : ''}`;
        }

        function showBlockedMessage(blockInfo) {
            const loginBox = document.getElementById('loginBox');

            if (blockInfo.permanent) {
                loginBox.innerHTML = `
                    <h1>Access Chat Source</h1>
                    <div class="blocked">
                        ⛔ Your IP address has been permanently blocked due to multiple failed attempts.
                        <br><br>
                        Access is permanently denied.
                    </div>
                `;
            } else {
                const timeRemaining = formatTimeRemaining(blockInfo.remainingTime);
                loginBox.innerHTML = `
                    <h1>Access Chat Source</h1>
                    <div class="blocked">
                        🚫 Your IP address is temporarily blocked due to failed login attempts.
                        <br><br>
                        Time remaining: <strong>${timeRemaining}</strong>
                        <br><br>
                        Please try again later.
                    </div>
                `;

                // Update countdown every second
                const interval = setInterval(async () => {
                    const blockStatus = await isIPBlocked(userIP);
                    if (!blockStatus.blocked) {
                        clearInterval(interval);
                        location.reload();
                    } else {
                        const timeLeft = formatTimeRemaining(blockStatus.remainingTime);
                        loginBox.querySelector('.blocked').innerHTML = `
                            🚫 Your IP address is temporarily blocked due to failed login attempts.
                            <br><br>
                            Time remaining: <strong>${timeLeft}</strong>
                            <br><br>
                            Please try again later.
                        `;
                    }
                }, 1000);
            }
        }

        function showLoginForm(showWarning = false) {
            const loginBox = document.getElementById('loginBox');

            loginBox.innerHTML = `
                <h1>Access Chat Source</h1>
                <div class="description">
                    The chat's source code is obfuscated in the original file. To access it here, you must enter the password to access the source code of Chat.
                </div>
                <input type="password" id="passwordInput" placeholder="Enter password">
                <button onclick="checkPassword()">Submit</button>
                <div class="attempts" id="attemptsMsg">Retry attempts left: 3</div>
                <div class="error" id="errorMsg"></div>
                ${showWarning ? '<div class="warning">⚠️ IP blocking is disabled (unable to fetch IP address). Session-based attempts only.</div>' : ''}
            `;

            // Check password on Enter key
            document.getElementById('passwordInput').addEventListener('keypress', function(event) {
                if (event.key === 'Enter') {
                    checkPassword();
                }
            });

            document.getElementById('passwordInput').focus();
        }

        function showError(message) {
            const loginBox = document.getElementById('loginBox');
            loginBox.innerHTML = `
                <h1>Access Chat Source</h1>
                <div class="error">${message}</div>
            `;
        }

        // ============================================
        // INITIALIZATION
        // ============================================
        async function initPage() {
            const loginBox = document.getElementById('loginBox');
            loginBox.innerHTML = '<div class="loading">Loading... Please wait.</div>';

            // Initialize Supabase
            if (CONFIG.supabaseUrl === 'YOUR_SUPABASE_URL' || CONFIG.supabaseAnonKey === 'YOUR_SUPABASE_ANON_KEY') {
                showError('⚠️ Supabase is not configured. Please update the CONFIG object with your Supabase credentials.');
                return;
            }

            const supabaseInitialized = initSupabase();
            if (!supabaseInitialized) {
                showError('Error: Unable to connect to database. Please try again later.');
                return;
            }

            // Get user IP
            userIP = await getUserIP();

            // Fallback: If IP fetch fails, continue without IP blocking
            if (!userIP) {
                showLoginForm(true);
                return;
            }

            // Check if IP is blocked
            const blockStatus = await isIPBlocked(userIP);

            if (blockStatus.blocked) {
                showBlockedMessage(blockStatus);
            } else {
                showLoginForm(false);
            }
        }

        // ============================================
        // PASSWORD CHECK
        // ============================================
        async function checkPassword() {
            const passwordInput = document.getElementById('passwordInput');
            const errorMsg = document.getElementById('errorMsg');
            const attemptsMsg = document.getElementById('attemptsMsg');
            const loginBox = document.getElementById('loginBox');
            const contentBox = document.getElementById('contentBox');

            if (passwordInput.value === CONFIG.password) {
                // Correct password - clear any block history for this IP
                if (userIP) {
                    await clearIPBlock(userIP);
                }

                loginBox.style.display = 'none';
                contentBox.style.display = 'block';
                document.getElementById('contentText').value = atob(CONFIG.content);
            } else {
                // Wrong password
                attemptsLeft--;

                if (attemptsLeft > 0) {
                    errorMsg.textContent = 'Incorrect password. Please try again.';
                    attemptsMsg.textContent = `Retry attempts left: ${attemptsLeft}`;
                    passwordInput.value = '';
                    passwordInput.focus();
                } else {
                    // No attempts left
                    if (userIP) {
                        // Block the IP if we have one
                        const blockInfo = await blockIP(userIP);

                        if (blockInfo.permanent) {
                            showBlockedMessage({ permanent: true });
                        } else {
                            showBlockedMessage({
                                permanent: false,
                                remainingTime: blockInfo.duration
                            });
                        }
                    } else {
                        // No IP - just disable the form for this session
                        errorMsg.textContent = 'No attempts left. Access denied for this session.';
                        attemptsMsg.textContent = 'Retry attempts left: 0';
                        passwordInput.disabled = true;
                        document.querySelector('button').disabled = true;
                    }
                }
            }
        }

        // ============================================
        // START APPLICATION
        // ============================================
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initPage);
        } else {
            initPage();
        }
    </script>
</body>
</html>
