<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <title>Luke Chat</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      color-scheme: dark;
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
      background: #09090b;
      color: #f4f4f5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #09090b;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 0.8rem 1rem;
      background: #5865f2;
      color: white;
      cursor: pointer;
      font-weight: 700;
    }

    button:hover {
      filter: brightness(1.08);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    button.secondary {
      background: #27272a;
    }

    button.small {
      padding: 0.45rem 0.7rem;
      border-radius: 9px;
      font-size: 0.9rem;
    }

    input,
    select {
      width: 100%;
      border: 1px solid #3f3f46;
      border-radius: 12px;
      background: #18181b;
      color: #f4f4f5;
      padding: 0.8rem;
      outline: none;
    }

    input[type="file"] {
      padding: 0.65rem;
    }

    input:focus,
    select:focus {
      border-color: #818cf8;
    }

    label {
      display: grid;
      gap: 0.4rem;
      color: #d4d4d8;
      font-size: 0.9rem;
    }

    .page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1rem;
    }

    .auth-page {
      background:
        radial-gradient(circle at top, rgba(88, 101, 242, 0.28), transparent 35%),
        #09090b;
    }

    .card {
      width: min(100%, 460px);
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 22px;
      padding: 1.5rem;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    .auth-card h1 {
      margin-top: 0;
      font-size: 2rem;
    }

    .muted {
      color: #a1a1aa;
    }

    .tiny {
      font-size: 0.78rem;
    }

    .error {
      color: #f87171;
      margin: 0;
    }

    .success {
      color: #86efac;
      margin: 0;
    }

    .auth-buttons,
    .passcode-form,
    .profile-form {
      display: grid;
      gap: 0.8rem;
    }

    .login-button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      width: 100%;
    }

    .login-button img {
      width: 26px;
      height: 26px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .login-button.discord {
      background: #5865f2;
    }

    .login-button.discord img {
      width: 32px;
      height: 28px;
    }

    .login-button.google {
      background: #ffffff;
      color: #18181b;
    }

    .login-button.google:hover {
      filter: brightness(0.95);
    }

    .account-box,
    .account-small {
      background: #09090b;
      border: 1px solid #27272a;
      border-radius: 14px;
      padding: 0.9rem;
      margin: 1rem 0;
      overflow-wrap: anywhere;
    }

    .chat-layout {
      height: 100vh;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      background: #09090b;
    }

    .sidebar {
      border-right: 1px solid #27272a;
      background: #111113;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      overflow-y: auto;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
    }

    .sidebar-header h2 {
      margin: 0;
    }

    .profile-form {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 18px;
      padding: 1rem;
    }

    .profile-form h3 {
      margin: 0;
    }

    .preview-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: #09090b;
      border: 1px solid #27272a;
      border-radius: 14px;
      padding: 0.75rem;
    }

    .chat-panel {
      min-width: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
    }

    .messages {
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .message {
      display: flex;
      gap: 0.75rem;
      max-width: 760px;
    }

    .message.mine {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message-body {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 16px;
      padding: 0.75rem 0.9rem;
      max-width: min(680px, 100%);
    }

    .message.mine .message-body {
      background: #312e81;
      border-color: #4338ca;
    }

    .message-meta {
      display: flex;
      gap: 0.7rem;
      align-items: baseline;
      margin-bottom: 0.25rem;
      flex-wrap: wrap;
    }

    .message-meta span {
      color: #a1a1aa;
      font-size: 0.75rem;
    }

    .message-body p {
      margin: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .message-media {
      margin-top: 0.7rem;
      max-width: 100%;
      border-radius: 14px;
      border: 1px solid #3f3f46;
      background: #09090b;
      display: block;
    }

    img.message-media {
      max-height: 420px;
      object-fit: contain;
    }

    video.message-media {
      width: min(100%, 620px);
      max-height: 420px;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      object-fit: cover;
      background: #27272a;
      flex: 0 0 auto;
    }

    .avatar.large {
      width: 54px;
      height: 54px;
    }

    .avatar.fallback {
      display: grid;
      place-items: center;
      color: white;
      font-weight: 800;
      background: linear-gradient(135deg, #5865f2, #a855f7);
    }

    .composer {
      border-top: 1px solid #27272a;
      background: #111113;
      padding: 1rem;
      display: grid;
      gap: 0.55rem;
    }

    .composer-main {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 0.7rem;
      align-items: center;
    }

    .file-plus-button {
      width: 46px;
      height: 46px;
      padding: 0;
      border-radius: 999px;
      background: #27272a;
      display: grid;
      place-items: center;
      font-size: 1.55rem;
      line-height: 1;
    }

    .file-plus-button:hover {
      background: #3f3f46;
      filter: none;
    }

    .hidden-file-input {
      display: none;
    }

    .selected-media-row {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 12px;
      padding: 0.55rem 0.7rem;
    }

    .selected-media-row.show {
      display: flex;
    }

    .selected-media-name {
      min-width: 0;
      color: #d4d4d8;
      font-size: 0.85rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .clear-media-button {
      background: #3f3f46;
      padding: 0.35rem 0.55rem;
      border-radius: 8px;
      font-size: 0.8rem;
      flex: 0 0 auto;
    }

    @media (max-width: 760px) {
      .chat-layout {
        height: auto;
        min-height: 100vh;
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid #27272a;
      }

      .chat-panel {
        min-height: 70vh;
      }

      .composer-main {
        grid-template-columns: auto minmax(0, 1fr) auto;
      }
    }
  </style>
</head>

<body>
  <div id="app"></div>

  <script>
    const SUPABASE_URL = 'https://egdytkqdzrfpalpkscah.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_DNwjiyydjOnoGE52AEf2Nw_K8xQyxO9';

    const DISCORD_LOGO_URL =
      'https://raw.githubusercontent.com/ipmingsum2/ipmingsum2.github.io/main/assets/images/Discord.png';

    const GOOGLE_LOGO_URL =
      'https://raw.githubusercontent.com/ipmingsum2/ipmingsum2.github.io/main/assets/images/google.png';

    const MESSAGE_LIMIT = 50;
    const AVATAR_BUCKET = 'avatars';
    const MESSAGE_MEDIA_BUCKET = 'message-media';

    const db = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY,
      {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true
        },
        realtime: {
          params: {
            eventsPerSecond: 5
          }
        }
      }
    );

    const state = {
      session: null,
      profile: null,
      isWhitelisted: false,
      checkingAccess: true,
      messages: [],
      profilesById: {},
      channel: null
    };

    const app = document.getElementById('app');

    init();

    async function init() {
      const { data } = await db.auth.getSession();
      state.session = data.session;

      db.auth.onAuthStateChange(async (_event, session) => {
        state.session = session;
        state.profile = null;
        state.isWhitelisted = false;
        state.messages = [];
        state.profilesById = {};

        if (state.channel) {
          await db.removeChannel(state.channel);
          state.channel = null;
        }

        await boot();
      });

      await boot();
    }

    async function boot() {
      if (!state.session) {
        state.checkingAccess = false;
        renderLogin();
        return;
      }

      await initializeUser();
    }

    async function initializeUser() {
      state.checkingAccess = true;
      renderLoading();

      try {
        await db.rpc('sync_my_profile');

        const { data: allowed, error } = await db.rpc(
          'is_current_user_whitelisted'
        );

        if (error) throw error;

        state.isWhitelisted = Boolean(allowed);

        if (allowed) {
          await loadMyProfile();
          await loadInitialMessages();
          subscribeToMessages();
          renderChat();
        } else {
          renderPasscode();
        }
      } catch (error) {
        console.error(error);
        renderError('Could not initialize user.');
      } finally {
        state.checkingAccess = false;
      }
    }

    async function loadMyProfile() {
      const { data, error } = await db
        .from('profiles')
        .select('id, display_name, avatar_url, provider, provider_user_id, email')
        .eq('id', state.session.user.id)
        .single();

      if (error) throw error;

      state.profile = data;
      state.profilesById[data.id] = data;
    }

    async function loadInitialMessages() {
      const { data, error } = await db
        .from('messages')
        .select('id, user_id, content, media_url, media_type, created_at')
        .order('created_at', { ascending: false })
        .limit(MESSAGE_LIMIT);

      if (error) throw error;

      state.messages = data.reverse();

      const userIds = [...new Set(state.messages.map(m => m.user_id))];
      await loadProfilesForUsers(userIds);
    }

    async function loadProfilesForUsers(userIds) {
      const missing = userIds.filter(id => !state.profilesById[id]);

      if (missing.length === 0) return;

      const { data, error } = await db
        .from('profiles')
        .select('id, display_name, avatar_url')
        .in('id', missing);

      if (error) {
        console.error(error);
        return;
      }

      for (const profile of data) {
        state.profilesById[profile.id] = profile;
      }
    }

    function subscribeToMessages() {
      if (state.channel) return;

      state.channel = db
        .channel('room:messages')
        .on(
          'postgres_changes',
          {
            event: 'INSERT',
            schema: 'public',
            table: 'messages'
          },
          async payload => {
            const message = payload.new;

            if (!state.messages.some(m => m.id === message.id)) {
              state.messages.push(message);
              state.messages = state.messages.slice(-MESSAGE_LIMIT);
            }

            await loadProfilesForUsers([message.user_id]);
            renderChat();
            scrollToBottom();
          }
        )
        .subscribe();
    }

    async function login(provider) {
      await db.auth.signInWithOAuth({
        provider,
        options: {
          redirectTo: window.location.href.split('#')[0]
        }
      });
    }

    async function logout() {
      if (state.channel) {
        await db.removeChannel(state.channel);
        state.channel = null;
      }

      await db.auth.signOut();
    }

    async function redeemPasscode(event) {
      event.preventDefault();

      const form = event.currentTarget;
      const passcode = form.passcode.value.trim();
      const errorEl = document.getElementById('passcode-error');

      errorEl.textContent = '';

      const { data, error } = await db.rpc('redeem_auth_passcode', {
        passcode
      });

      if (error) {
        console.error(error);
        errorEl.textContent = 'Something went wrong.';
        return;
      }

      if (!data) {
        errorEl.textContent = 'Incorrect passcode.';
        return;
      }

      await initializeUser();
    }

    async function sendMessage(event) {
      event.preventDefault();

      const input = document.getElementById('message-input');
      const mediaFileInput = document.getElementById('post-media-file-input');
      const sendButton = document.getElementById('send-message-button');

      const content = input.value.trim();
      const mediaFile = mediaFileInput.files?.[0] || null;

      if (!content && !mediaFile) return;

      sendButton.disabled = true;
      sendButton.textContent = 'Sending...';

      const originalContent = input.value;

      input.value = '';

      try {
        let mediaType = null;
        let mediaUrl = null;

        if (mediaFile) {
          mediaType = getMediaTypeFromFile(mediaFile);

          if (!mediaType) {
            throw new Error('Only image and video files are allowed.');
          }

          mediaUrl = await uploadFile(
            MESSAGE_MEDIA_BUCKET,
            mediaFile,
            `posts/${state.session.user.id}`
          );
        }

        const { error } = await db.from('messages').insert({
          user_id: state.session.user.id,
          content,
          media_url: mediaUrl,
          media_type: mediaType
        });

        if (error) throw error;

        mediaFileInput.value = '';
        updateSelectedMediaName();
      } catch (error) {
        console.error(error);
        input.value = originalContent;
        window.__lastSendError = error.message || 'Could not send message.';
        renderChat();
      } finally {
        sendButton.disabled = false;
        sendButton.textContent = 'Send';
      }
    }

    async function saveProfile(event) {
      event.preventDefault();

      const displayName = document
        .getElementById('display-name-input')
        .value
        .trim()
        .slice(0, 40) || 'User';

      const avatarUrlInput = document
        .getElementById('avatar-url-input')
        .value
        .trim()
        .slice(0, 500);

      const avatarFileInput = document.getElementById('avatar-file-input');
      const avatarFile = avatarFileInput.files?.[0] || null;

      const button = document.getElementById('save-profile-button');
      const statusEl = document.getElementById('profile-status');

      button.disabled = true;
      button.textContent = 'Saving...';
      statusEl.textContent = '';
      statusEl.className = 'tiny muted';

      try {
        let avatarUrl = avatarUrlInput || null;

        if (avatarFile) {
          if (!avatarFile.type.startsWith('image/')) {
            throw new Error('Profile image must be an image file.');
          }

          avatarUrl = await uploadFile(
            AVATAR_BUCKET,
            avatarFile,
            `avatars/${state.session.user.id}`
          );
        }

        const { data, error } = await db
          .from('profiles')
          .update({
            display_name: displayName,
            avatar_url: avatarUrl || null
          })
          .eq('id', state.session.user.id)
          .select('id, display_name, avatar_url, provider, provider_user_id, email')
          .single();

        if (error) throw error;

        state.profile = data;
        state.profilesById[data.id] = data;

        statusEl.textContent = 'Profile saved.';
        statusEl.className = 'tiny success';

        renderChat();
      } catch (error) {
        console.error(error);
        statusEl.textContent = error.message || 'Could not save profile.';
        statusEl.className = 'tiny error';
      } finally {
        button.disabled = false;
        button.textContent = 'Save profile';
      }
    }

    async function uploadFile(bucket, file, folder) {
      const safeName = file.name
        .toLowerCase()
        .replace(/[^a-z0-9._-]/g, '-');

      const path =
        `${folder}/${Date.now()}-${crypto.randomUUID()}-${safeName}`;

      const { error } = await db.storage
        .from(bucket)
        .upload(path, file, {
          cacheControl: '3600',
          upsert: false
        });

      if (error) throw error;

      const { data } = db.storage
        .from(bucket)
        .getPublicUrl(path);

      return data.publicUrl;
    }

    function getMediaTypeFromFile(file) {
      if (file.type.startsWith('image/')) return 'image';
      if (file.type.startsWith('video/')) return 'video';
      return null;
    }

    function updateSelectedMediaName() {
      const fileInput = document.getElementById('post-media-file-input');
      const row = document.getElementById('selected-media-row');
      const nameEl = document.getElementById('selected-media-name');

      if (!fileInput || !row || !nameEl) return;

      const file = fileInput.files?.[0] || null;

      if (!file) {
        row.classList.remove('show');
        nameEl.textContent = '';
        return;
      }

      row.classList.add('show');
      nameEl.textContent = file.name;
    }

    function renderLogin() {
      app.innerHTML = `
        <main class="page auth-page">
          <section class="card auth-card">
            <h1>Luke Chat</h1>
            <p class="muted">A chat made for Alvin and Luke to finally chat without YouTube comments.</p>

            <div class="auth-buttons">
              <button id="discord-login" class="login-button discord">
                <img
                  src="${DISCORD_LOGO_URL}"
                  alt=""
                  loading="lazy"
                  referrerpolicy="no-referrer"
                />
                <span>Continue with Discord</span>
              </button>

              <button id="google-login" class="login-button google">
                <img
                  src="${GOOGLE_LOGO_URL}"
                  alt=""
                  loading="lazy"
                  referrerpolicy="no-referrer"
                />
                <span>Continue with Google</span>
              </button>
            </div>
          </section>
        </main>
      `;

      document
        .getElementById('discord-login')
        .addEventListener('click', () => login('discord'));

      document
        .getElementById('google-login')
        .addEventListener('click', () => login('google'));
    }

    function renderLoading() {
      app.innerHTML = `
        <main class="page">
          <section class="card">
            <p>Checking whitelist...</p>
          </section>
        </main>
      `;
    }

    function renderError(message) {
      app.innerHTML = `
        <main class="page">
          <section class="card">
            <h1>Error</h1>
            <p class="error">${escapeHtml(message)}</p>
            <button id="logout-button">Sign out</button>
          </section>
        </main>
      `;

      document
        .getElementById('logout-button')
        .addEventListener('click', logout);
    }

    function renderPasscode() {
      const user = state.session.user;
      const provider = user.app_metadata?.provider || 'unknown';
      const providerId =
        user.user_metadata?.provider_id ||
        user.user_metadata?.sub ||
        user.id;

      app.innerHTML = `
        <main class="page auth-page">
          <section class="card auth-card">
            <h1>Access Required</h1>

            <p class="muted">
              This account is not currently whitelisted.
            </p>

            <div class="account-box">
              <div><strong>Provider:</strong> ${escapeHtml(provider)}</div>
              <div><strong>Provider ID:</strong> ${escapeHtml(providerId)}</div>
              <div><strong>Email:</strong> ${escapeHtml(user.email || 'N/A')}</div>
            </div>

            <form id="passcode-form" class="passcode-form">
              <label>
                Authentication passcode
                <input
                  name="passcode"
                  placeholder="Enter passcode"
                  autocomplete="off"
                />
              </label>

              <p id="passcode-error" class="error"></p>

              <button type="submit">Authenticate</button>
            </form>

            <button id="logout-button" class="secondary">Sign out</button>
          </section>
        </main>
      `;

      document
        .getElementById('passcode-form')
        .addEventListener('submit', redeemPasscode);

      document
        .getElementById('logout-button')
        .addEventListener('click', logout);
    }

    function renderChat() {
      const profile = state.profile || {};
      const user = state.session.user;
      const sendError = window.__lastSendError || '';
      window.__lastSendError = '';

      app.innerHTML = `
        <main class="chat-layout">
          <aside class="sidebar">
            <div class="sidebar-header">
              <h2>Chat</h2>
              <button id="logout-button" class="secondary small">
                Sign out
              </button>
            </div>

            <form id="profile-form" class="profile-form">
              <h3>Profile</h3>

              <div class="preview-row">
                ${renderAvatar(profile.display_name || 'User', profile.avatar_url, true)}
                <div>
                  <strong>${escapeHtml(profile.display_name || 'User')}</strong>
                  <div class="muted tiny">Current profile image</div>
                </div>
              </div>

              <label>
                Display name
                <input
                  id="display-name-input"
                  value="${escapeAttr(profile.display_name || '')}"
                  maxlength="40"
                />
              </label>

              <label>
                Profile image URL
                <input
                  id="avatar-url-input"
                  value="${escapeAttr(profile.avatar_url || '')}"
                  placeholder="https://..."
                />
              </label>

              <label>
                Or upload profile image
                <input
                  id="avatar-file-input"
                  type="file"
                  accept="image/*"
                />
              </label>

              <p class="muted tiny">
                If you upload a file, it will replace the URL above.
              </p>

              <p id="profile-status" class="tiny muted"></p>

              <button id="save-profile-button" type="submit">
                Save profile
              </button>
            </form>

            <div class="account-small">
              <p>
                Signed in as
                <strong>${escapeHtml(profile.display_name || user.email || 'User')}</strong>
              </p>
              <p class="muted tiny">
                ${escapeHtml(profile.provider || '')}
                /
                ${escapeHtml(profile.email || profile.provider_user_id || '')}
              </p>
            </div>
          </aside>

          <section class="chat-panel">
            <div id="messages" class="messages">
              ${state.messages.map(renderMessage).join('')}
              <div id="bottom"></div>
            </div>

            <form id="composer" class="composer">
              <div class="composer-main">
                <button
                  id="pick-media-button"
                  class="file-plus-button"
                  type="button"
                  title="Add image or video"
                  aria-label="Add image or video"
                >
                  +
                </button>

                <input
                  id="post-media-file-input"
                  class="hidden-file-input"
                  type="file"
                  accept="image/*,video/*"
                />

                <input
                  id="message-input"
                  placeholder="Type a message..."
                  maxlength="1000"
                  autocomplete="off"
                />

                <button id="send-message-button" type="submit">Send</button>
              </div>

              <div id="selected-media-row" class="selected-media-row">
                <span id="selected-media-name" class="selected-media-name"></span>
                <button
                  id="clear-media-button"
                  class="clear-media-button"
                  type="button"
                >
                  Remove
                </button>
              </div>

              ${
                sendError
                  ? `<p class="error tiny">${escapeHtml(sendError)}</p>`
                  : ''
              }
            </form>
          </section>
        </main>
      `;

      document
        .getElementById('logout-button')
        .addEventListener('click', logout);

      document
        .getElementById('profile-form')
        .addEventListener('submit', saveProfile);

      document
        .getElementById('composer')
        .addEventListener('submit', sendMessage);

      document
        .getElementById('pick-media-button')
        .addEventListener('click', () => {
          document.getElementById('post-media-file-input').click();
        });

      document
        .getElementById('post-media-file-input')
        .addEventListener('change', updateSelectedMediaName);

      document
        .getElementById('clear-media-button')
        .addEventListener('click', () => {
          const fileInput = document.getElementById('post-media-file-input');
          fileInput.value = '';
          updateSelectedMediaName();
        });

      scrollToBottom();
    }

    function renderMessage(message) {
      const sender = state.profilesById[message.user_id] || {};
      const mine = message.user_id === state.session.user.id;
      const name = sender.display_name || 'User';
      const avatarUrl = sender.avatar_url;

      return `
        <article class="message ${mine ? 'mine' : ''}">
          ${renderAvatar(name, avatarUrl)}

          <div class="message-body">
            <div class="message-meta">
              <strong>${escapeHtml(name)}</strong>
              <span>${escapeHtml(new Date(message.created_at).toLocaleString())}</span>
            </div>

            ${
              message.content
                ? `<p>${escapeHtml(message.content)}</p>`
                : ''
            }

            ${renderMessageMedia(message.media_url, message.media_type)}
          </div>
        </article>
      `;
    }

    function renderMessageMedia(mediaUrl, mediaType) {
      if (!mediaUrl || !mediaType) return '';

      if (mediaType === 'image') {
        return `
          <img
            class="message-media"
            src="${escapeAttr(mediaUrl)}"
            alt="Post image"
            loading="lazy"
            referrerpolicy="no-referrer"
          />
        `;
      }

      if (mediaType === 'video') {
        return `
          <video
            class="message-media"
            src="${escapeAttr(mediaUrl)}"
            controls
            preload="metadata"
          ></video>
        `;
      }

      return '';
    }

    function renderAvatar(name, avatarUrl, large = false) {
      if (avatarUrl) {
        return `
          <img
            class="avatar ${large ? 'large' : ''}"
            src="${escapeAttr(avatarUrl)}"
            alt="${escapeAttr(name)}"
            loading="lazy"
            referrerpolicy="no-referrer"
          />
        `;
      }

      return `
        <div class="avatar fallback ${large ? 'large' : ''}">
          ${escapeHtml(name.slice(0, 1).toUpperCase())}
        </div>
      `;
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        document.getElementById('bottom')?.scrollIntoView({
          behavior: 'smooth'
        });
      });
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }
  </script>
</body>
</html>
