<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Realtime Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#0e1320; --panel:#161c2f; --line:#25314f; --text:#ecf1ff; --muted:#a7b0c9;
      --primary:#5ea1ff; --danger:#ff6d6d; --ok:#67d08b;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:var(--bg);color:var(--text)}
    .wrap{max-width:980px;margin:0 auto;padding:12px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px}
    h2,h3{margin:8px 0 10px}
    .row{display:flex;gap:8px;flex-wrap:wrap}
    input,button,select,textarea{
      border:1px solid #324266;background:#0f1628;color:var(--text);border-radius:10px;
      padding:10px 12px;font-size:14px
    }
    input,select,textarea{flex:1;min-width:140px}
    button{cursor:pointer;background:var(--primary);border:none;color:#091427;font-weight:700}
    button.danger{background:var(--danger);color:#290808}
    button.ghost{background:#243455;color:#dfe9ff}
    .muted{color:var(--muted);font-size:12px}
    .hidden{display:none !important}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px}
    .chat{
      height:52vh;overflow:auto;border:1px solid var(--line);border-radius:12px;padding:10px;background:#0e1528;
      display:flex;flex-direction:column;gap:8px
    }
    .msg{border:1px solid #2b395c;background:#192442;border-radius:10px;padding:8px}
    .msg .meta{font-size:12px;color:#c5d0ec;margin-bottom:6px;display:flex;justify-content:space-between;gap:8px}
    .msg .text{white-space:pre-wrap;word-break:break-word}
    .msg img{max-width:220px;border-radius:8px;border:1px solid #334768;margin-top:6px}
    .msg.deleted{opacity:.6;background:#2a2f3f}
    .badge{display:inline-block;padding:3px 8px;border-radius:999px;font-size:11px;background:#243455;color:#d8e5ff}
    .badge.admin{background:#3f2d0e;color:#ffd58f}
    .ok{color:var(--ok)} .err{color:var(--danger)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <h2>Chat Room</h2>
      <div id="status" class="muted">Not logged in</div>
    </div>

    <!-- AUTH -->
    <div id="authCard" class="card">
      <h3>Login / Register</h3>
      <div class="row">
        <input id="email" placeholder="Email" />
        <input id="password" type="password" placeholder="Password" />
      </div>
      <div class="row" style="margin-top:8px">
        <input id="username" placeholder="Username (register only)" />
        <input id="displayName" placeholder="Display Name (register only)" />
      </div>
      <div class="row" style="margin-top:8px">
        <button id="btnLogin">Login</button>
        <button id="btnRegister" class="ghost">Register</button>
      </div>
      <div id="authMsg" class="muted" style="margin-top:8px"></div>
    </div>

    <!-- APP -->
    <div id="appCard" class="card hidden" style="margin-top:12px">
      <div class="row" style="align-items:center">
        <span id="roleBadge" class="badge">user</span>
        <input id="room" value="lobby" placeholder="room" style="max-width:180px" />
        <button id="btnJoin" class="ghost">Join Room</button>
        <button id="btnLogout" class="danger">Logout</button>
      </div>

      <div class="row" style="margin-top:8px">
        <input id="profileDisplayName" placeholder="New Display Name" />
        <input id="avatarFile" type="file" accept="image/*" />
        <button id="btnSaveProfile" class="ghost">Save Profile</button>
      </div>

      <div id="meLine" class="muted" style="margin-top:8px"></div>

      <div id="chat" class="chat" style="margin-top:10px"></div>

      <div class="row" style="margin-top:10px">
        <textarea id="msgText" rows="2" placeholder="Type message..."></textarea>
      </div>
      <div class="row" style="margin-top:8px">
        <input id="msgImage" type="file" accept="image/*" />
        <button id="btnSend">Send</button>
      </div>

      <!-- ADMIN PANEL -->
      <div id="adminPanel" class="card hidden" style="margin-top:12px;background:#1b2034">
        <h3>Admin Panel</h3>
        <div class="row">
          <input id="targetIp" placeholder="Target IP (e.g. 1.2.3.4)" />
          <input id="muteSeconds" type="number" value="60" placeholder="Mute seconds" style="max-width:140px" />
        </div>
        <div class="row" style="margin-top:8px">
          <button id="btnMute" class="ghost">Mute IP</button>
          <button id="btnUnmute" class="ghost">Unmute IP</button>
          <button id="btnBan" class="danger">Ban IP</button>
          <button id="btnUnban" class="ghost">Unban IP</button>
        </div>
        <div id="adminMsg" class="muted" style="margin-top:8px"></div>
      </div>
    </div>
  </div>

<script>
/* =========================
   CONFIG
========================= */
const SUPABASE_URL = "https://lflkpziiwnoamvtrbcil.supabase.co"; // e.g. https://abcxyz.supabase.co
const SUPABASE_ANON_KEY = "sb_publishable_tFvlhmTEDV3SOSVp0JvVzg_KHXFiDNb";

/* ========================= */
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const el = (id) => document.getElementById(id);
const authCard = el("authCard"), appCard = el("appCard"), statusEl = el("status"), chatEl = el("chat");
const adminPanel = el("adminPanel"), roleBadge = el("roleBadge"), meLine = el("meLine");

let currentUser = null;
let profile = null;
let room = "lobby";
let channel = null;

function uiMsg(id, msg, good=false) {
  const x = el(id);
  x.className = good ? "ok muted" : "err muted";
  x.textContent = msg;
}
function esc(s=""){ return s.replace(/[&<>"']/g, m=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m])); }
function dt(iso){ try { return new Date(iso).toLocaleString(); } catch { return iso; } }

async function ensureProfile(user, usernameHint="", displayHint="") {
  let { data: p } = await sb.from("profiles").select("*").eq("id", user.id).maybeSingle();
  if (!p) {
    const username = usernameHint || user.email.split("@")[0].slice(0,24);
    const display_name = displayHint || username;
    const ins = await sb.from("profiles").insert({ id:user.id, username, display_name, role:"user" }).select("*").single();
    if (ins.error) throw ins.error;
    p = ins.data;
  }
  return p;
}

function setLoggedOut() {
  currentUser = null; profile = null;
  authCard.classList.remove("hidden");
  appCard.classList.add("hidden");
  statusEl.textContent = "Not logged in";
  chatEl.innerHTML = "";
  if (channel) { sb.removeChannel(channel); channel = null; }
}

function renderMe() {
  roleBadge.textContent = profile?.role || "user";
  roleBadge.className = "badge" + (profile?.role === "admin" ? " admin" : "");
  adminPanel.classList.toggle("hidden", profile?.role !== "admin");
  meLine.innerHTML = `Signed in as <b>${esc(profile?.display_name || "")}</b> (@${esc(profile?.username || "")})`;
  statusEl.textContent = `Logged in: ${profile?.display_name || currentUser?.email}`;
}

function msgActions(m) {
  const isOwner = currentUser && m.user_id === currentUser.id;
  const isAdmin = profile?.role === "admin";
  if (!isOwner && !isAdmin) return "";
  return `<button class="ghost" onclick="deleteMessage('${m.id}')">Delete</button>`;
}

function renderMessage(m) {
  const deleted = m.deleted ? "deleted" : "";
  const avatar = m.avatar_url ? `<img src="${esc(m.avatar_url)}" alt="avatar" style="width:26px;height:26px;border-radius:50%;object-fit:cover;border:1px solid #445;" />` : "";
  const img = m.image_url ? `<div><img src="${esc(m.image_url)}" alt="upload" /></div>` : "";
  const text = m.deleted ? "<i>[deleted]</i>" : esc(m.text || "");
  const adminIP = (profile?.role === "admin" && m.ip) ? `<span class="muted">IP: ${esc(m.ip)}</span>` : "";
  return `
  <div class="msg ${deleted}" id="msg-${m.id}">
    <div class="meta">
      <span>${avatar} <b>${esc(m.display_name || m.username || "user")}</b> @${esc(m.username || "")}</span>
      <span>${dt(m.created_at)} ${adminIP}</span>
    </div>
    <div class="text">${text}</div>
    ${img}
    <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">
      ${msgActions(m)}
      ${profile?.role==="admin" && m.ip ? `
        <button class="ghost" onclick="fillIp('${m.ip}')">Use IP</button>
      ` : ""}
    </div>
  </div>`;
}

function appendMessage(m) {
  chatEl.insertAdjacentHTML("beforeend", renderMessage(m));
  chatEl.scrollTop = chatEl.scrollHeight;
}

async function loadMessages() {
  chatEl.innerHTML = "";
  const { data, error } = await sb.from("messages")
    .select("*")
    .eq("room", room)
    .order("created_at", { ascending: true })
    .limit(200);
  if (error) return console.error(error);
  data.forEach(appendMessage);
}

async function joinRoom() {
  room = (el("room").value || "lobby").trim();
  await loadMessages();

  if (channel) await sb.removeChannel(channel);
  channel = sb.channel(`room-${room}-${Date.now()}`)
    .on("postgres_changes", { event: "INSERT", schema: "public", table: "messages", filter: `room=eq.${room}` },
      (payload) => appendMessage(payload.new))
    .on("postgres_changes", { event: "UPDATE", schema: "public", table: "messages", filter: `room=eq.${room}` },
      (payload) => {
        const box = document.getElementById(`msg-${payload.new.id}`);
        if (box) box.outerHTML = renderMessage(payload.new);
      })
    .subscribe();
}

async function uploadImage(file) {
  const ext = (file.name.split(".").pop() || "jpg").toLowerCase();
  const path = `${currentUser.id}/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
  const { error } = await sb.storage.from("chat-media").upload(path, file, { upsert: false });
  if (error) throw error;
  const { data } = sb.storage.from("chat-media").getPublicUrl(path);
  return data.publicUrl;
}

async function login() {
  uiMsg("authMsg", "");
  const email = el("email").value.trim();
  const password = el("password").value;
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) return uiMsg("authMsg", error.message);
  currentUser = data.user;
  profile = await ensureProfile(currentUser);
  authCard.classList.add("hidden");
  appCard.classList.remove("hidden");
  renderMe();
  await joinRoom();
  uiMsg("authMsg", "Login success", true);
}

async function register() {
  uiMsg("authMsg", "");
  const email = el("email").value.trim();
  const password = el("password").value;
  const username = el("username").value.trim();
  const displayName = el("displayName").value.trim() || username;

  const { data, error } = await sb.auth.signUp({ email, password });
  if (error) return uiMsg("authMsg", error.message);
  if (!data.user) return uiMsg("authMsg", "Check your email confirmation, then login.", true);

  currentUser = data.user;
  try {
    profile = await ensureProfile(currentUser, username, displayName);
  } catch (e) {
    return uiMsg("authMsg", e.message || "Profile creation failed");
  }

  authCard.classList.add("hidden");
  appCard.classList.remove("hidden");
  renderMe();
  await joinRoom();
  uiMsg("authMsg", "Registered + logged in", true);
}

async function logout() {
  await sb.auth.signOut();
  setLoggedOut();
}

async function saveProfile() {
  const display_name = el("profileDisplayName").value.trim() || profile.display_name;
  let avatar_url = profile.avatar_url || null;

  const file = el("avatarFile").files[0];
  if (file) avatar_url = await uploadImage(file);

  const { error } = await sb.from("profiles")
    .update({ display_name, avatar_url })
    .eq("id", currentUser.id);
  if (error) return alert(error.message);

  profile.display_name = display_name;
  profile.avatar_url = avatar_url;
  renderMe();
  alert("Profile updated");
}

async function sendMessage() {
  const text = el("msgText").value.trim();
  const file = el("msgImage").files[0];
  if (!text && !file) return;

  let image_url = null;
  if (file) image_url = await uploadImage(file);

  // Optional: get IP via external service (not fully reliable)
  let ip = null;
  try {
    const r = await fetch("https://api.ipify.org?format=json");
    const j = await r.json();
    ip = j.ip || null;
  } catch {}

  const row = {
    room,
    user_id: currentUser.id,
    text: text || null,
    image_url,
    username: profile.username,
    display_name: profile.display_name,
    avatar_url: profile.avatar_url || null,
    ip // for admin tools (client-provided, spoofable). For true security use Edge Function.
  };

  const { error } = await sb.from("messages").insert(row);
  if (error) return alert(error.message);

  el("msgText").value = "";
  el("msgImage").value = "";
}

window.deleteMessage = async function(messageId) {
  // safer soft-delete
  const { error } = await sb.from("messages")
    .update({ deleted: true, text: null, image_url: null })
    .eq("id", messageId);
  if (error) alert(error.message);
};

window.fillIp = function(ip) {
  el("targetIp").value = ip || "";
};

// ADMIN (table-based moderation states)
async function adminMute() {
  const targetIp = el("targetIp").value.trim();
  const seconds = Number(el("muteSeconds").value || 60);
  if (!targetIp) return uiMsg("adminMsg", "Enter target IP");
  const muted_until = new Date(Date.now() + seconds * 1000).toISOString();
  const { error } = await sb.from("ip_mutes").upsert({ ip: targetIp, muted_until, reason: "admin mute" });
  if (error) return uiMsg("adminMsg", error.message);
  uiMsg("adminMsg", `Muted ${targetIp} for ${seconds}s`, true);
}
async function adminUnmute() {
  const targetIp = el("targetIp").value.trim();
  if (!targetIp) return uiMsg("adminMsg", "Enter target IP");
  const { error } = await sb.from("ip_mutes").delete().eq("ip", targetIp);
  if (error) return uiMsg("adminMsg", error.message);
  uiMsg("adminMsg", `Unmuted ${targetIp}`, true);
}
async function adminBan() {
  const targetIp = el("targetIp").value.trim();
  if (!targetIp) return uiMsg("adminMsg", "Enter target IP");
  const { error } = await sb.from("ip_bans").upsert({ ip: targetIp, reason: "admin ban" });
  if (error) return uiMsg("adminMsg", error.message);
  uiMsg("adminMsg", `Banned ${targetIp}`, true);
}
async function adminUnban() {
  const targetIp = el("targetIp").value.trim();
  if (!targetIp) return uiMsg("adminMsg", "Enter target IP");
  const { error } = await sb.from("ip_bans").delete().eq("ip", targetIp);
  if (error) return uiMsg("adminMsg", error.message);
  uiMsg("adminMsg", `Unbanned ${targetIp}`, true);
}

// hook buttons
el("btnLogin").onclick = login;
el("btnRegister").onclick = register;
el("btnLogout").onclick = logout;
el("btnJoin").onclick = joinRoom;
el("btnSaveProfile").onclick = saveProfile;
el("btnSend").onclick = sendMessage;
el("btnMute").onclick = adminMute;
el("btnUnmute").onclick = adminUnmute;
el("btnBan").onclick = adminBan;
el("btnUnban").onclick = adminUnban;

// session restore
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session?.user) return setLoggedOut();
  currentUser = session.user;
  try {
    profile = await ensureProfile(currentUser);
    authCard.classList.add("hidden");
    appCard.classList.remove("hidden");
    renderMe();
    await joinRoom();
  } catch {
    setLoggedOut();
  }
})();
</script>
</body>
</html>
