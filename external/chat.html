<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Chat Fixed</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#0c1220;--panel:#141c31;--line:#28385e;--txt:#eef3ff;--muted:#a8b3ce;--pri:#69a8ff;--ok:#58c98b;--err:#ff6f6f}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--txt);font-family:system-ui}
    .app{max-width:920px;margin:0 auto;padding:12px}.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px}
    .row{display:flex;gap:8px;flex-wrap:wrap} input,textarea,button{padding:10px;border-radius:10px}
    input,textarea{border:1px solid #345;background:#0e1629;color:var(--txt);flex:1;min-width:120px}
    button{border:none;cursor:pointer;background:var(--pri);color:#081327;font-weight:700}.ghost{background:#24385f;color:#dfe9ff}.danger{background:var(--err);color:#2f0909}
    .hidden{display:none!important}.muted{font-size:12px;color:var(--muted)}
    .chat{height:50vh;overflow:auto;border:1px solid var(--line);border-radius:12px;padding:10px;background:#0d162c;display:flex;flex-direction:column;gap:8px}
    .msg{border:1px solid #2a3b61;background:#192746;border-radius:10px;padding:8px}.msg.deleted{opacity:.65;background:#2a3042}
    .meta{display:flex;justify-content:space-between;font-size:12px;color:#cbd4ec}.avatar{width:22px;height:22px;border-radius:50%;vertical-align:middle;margin-right:6px;border:1px solid #456}
    .img{max-width:220px;border-radius:8px;border:1px solid #3b4e79;margin-top:8px}
    .actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}.actions button{padding:6px 9px;font-size:12px}
    .toastWrap{position:fixed;right:12px;bottom:12px;display:flex;flex-direction:column;gap:8px;z-index:9999}
    .toast{background:#16243f;border:1px solid #3d5281;padding:10px 12px;border-radius:10px;max-width:320px}
    .toast.ok{background:#133025;border-color:#2f7d52}.toast.err{background:#381818;border-color:#8a4040}
  </style>
</head>
<body>
<div class="app">
  <div class="card" id="authCard">
    <h3>Login / Register</h3>
    <div class="row"><input id="email" placeholder="Email"><input id="password" type="password" placeholder="Password"></div>
    <div class="row"><input id="username" placeholder="Username (register)"><input id="displayName" placeholder="Display name (register)"></div>
    <div class="row"><button id="loginBtn">Login</button><button id="registerBtn" class="ghost">Register</button></div>
    <div id="authMsg" class="muted"></div>
  </div>

  <div class="card hidden" id="appCard" style="margin-top:10px">
    <div class="row"><input id="room" value="lobby" style="max-width:180px"><button id="joinBtn" class="ghost">Join</button><button id="logoutBtn" class="danger">Logout</button></div>
    <div class="row">
      <input id="newDisplay" placeholder="New display name">
      <input id="avatarInput" type="file" accept="image/*" hidden>
      <button id="avatarPick" class="ghost" type="button">Choose Avatar</button>
      <span id="avatarFileName" class="muted">No file</span>
      <button id="saveProfileBtn" class="ghost">Save Profile</button>
    </div>
    <div id="me" class="muted"></div>

    <div id="chat" class="chat"></div>

    <div class="row" style="margin-top:8px"><textarea id="msg" placeholder="Message"></textarea></div>
    <div class="row">
      <input id="imgInput" type="file" accept="image/*" hidden>
      <button id="imgPick" class="ghost" type="button">Attach Image</button>
      <span id="imgFileName" class="muted">No file</span>
      <button id="sendBtn">Send</button>
    </div>

    <div id="adminBox" class="hidden" style="margin-top:8px;border-top:1px solid #2d3f68;padding-top:8px">
      <div class="row"><input id="targetIp" placeholder="Target IP"><input id="muteSec" type="number" value="60" style="max-width:120px"></div>
      <div class="row"><button id="muteBtn">Mute</button><button id="unmuteBtn" class="ghost">Unmute</button><button id="banBtn" class="danger">Ban</button><button id="unbanBtn" class="ghost">Unban</button></div>
      <div id="adminMsg" class="muted"></div>
    </div>
  </div>
</div>
<div id="toastWrap" class="toastWrap"></div>

<script>
const SUPABASE_URL="https://lflkpziiwnoamvtrbcil.supabase.co";
const SUPABASE_ANON_KEY="sb_publishable_tFvlhmTEDV3SOSVp0JvVzg_KHXFiDNb";
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

const $=id=>document.getElementById(id);
let user=null, profile=null, room="lobby", channel=null;

const t=(m,type="ok")=>{const d=document.createElement("div");d.className="toast "+type;d.textContent=m;$("toastWrap").appendChild(d);setTimeout(()=>d.remove(),2800);}
const eMsg=(ctx,err)=>`${ctx}: ${err?.message||err?.error_description||JSON.stringify(err)}`;
const esc=s=>String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
const time=s=>new Date(s).toLocaleString();

$("avatarPick").onclick=()=>$("avatarInput").click();
$("imgPick").onclick=()=>$("imgInput").click();
$("avatarInput").onchange=()=>$("avatarFileName").textContent=$("avatarInput").files?.[0]?.name||"No file";
$("imgInput").onchange=()=>$("imgFileName").textContent=$("imgInput").files?.[0]?.name||"No file";

async function ensureProfile(u,uname="",dname=""){
  let {data,error}=await sb.from("profiles").select("*").eq("id",u.id).maybeSingle();
  if(error) throw error;
  if(!data){
    const username=(uname||u.email.split("@")[0]).slice(0,24);
    const display_name=(dname||username).slice(0,48);
    const ins=await sb.from("profiles").insert({id:u.id,username,display_name,role:"user"}).select("*").single();
    if(ins.error) throw ins.error;
    data=ins.data;
  }
  return data;
}

function showApp(){
  $("authCard").classList.add("hidden");
  $("appCard").classList.remove("hidden");
  $("me").innerHTML=`You: <b>${esc(profile.display_name)}</b> @${esc(profile.username)} (${esc(profile.role)})`;
  $("adminBox").classList.toggle("hidden",profile.role!=="admin");
}

function showAuth(){
  $("authCard").classList.remove("hidden");
  $("appCard").classList.add("hidden");
  $("chat").innerHTML="";
  if(channel){sb.removeChannel(channel);channel=null;}
}

async function upload(file){
  const ext=(file.name.split(".").pop()||"jpg").toLowerCase();
  const path=`${user.id}/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
  const up=await sb.storage.from("chat-media").upload(path,file,{upsert:false});
  if(up.error) throw up.error;
  return sb.storage.from("chat-media").getPublicUrl(path).data.publicUrl;
}

function drawMessage(m){
  const av=m.profiles?.avatar_url?`<img class="avatar" src="${esc(m.profiles.avatar_url)}">`:"";
  const disp=m.profiles?.display_name||"user";
  const uname=m.profiles?.username||"";
  const mine=m.user_id===user.id;
  const admin=profile.role==="admin";
  const canDelete=mine||admin;
  const deleted=m.deleted;
  const text=deleted?"<i>[deleted]</i>":esc(m.text||"");
  const img=(!deleted&&m.image_url)?`<img class="img" src="${esc(m.image_url)}">`:"";
  return `<div class="msg ${deleted?"deleted":""}" id="m-${m.id}">
    <div class="meta"><span>${av}<b>${esc(disp)}</b> @${esc(uname)}</span><span>${time(m.created_at)}</span></div>
    <div>${text}</div>${img}
    <div class="actions">
      ${canDelete?`<button class="ghost" onclick="delMsg('${m.id}')">Delete</button>`:""}
    </div></div>`;
}

async function loadMessages(){
  $("chat").innerHTML="";
  const q=await sb.from("messages")
    .select("id,room,user_id,text,image_url,created_at,deleted,profiles(username,display_name,avatar_url)")
    .eq("room",room).order("created_at",{ascending:true}).limit(200);

  if(q.error){t(eMsg("loadMessages",q.error),"err");return;}
  q.data.forEach(m=>$("chat").insertAdjacentHTML("beforeend",drawMessage(m)));
  $("chat").scrollTop=$("chat").scrollHeight;
}

window.delMsg=async(id)=>{
  const q=await sb.from("messages").update({deleted:true,text:null,image_url:null}).eq("id",id);
  if(q.error) t(eMsg("delete",q.error),"err");
  else t("Message deleted");
};

async function join(){
  room=($("room").value.trim()||"lobby").slice(0,64);
  await loadMessages();
  if(channel) await sb.removeChannel(channel);
  channel=sb.channel("room-"+room+"-"+Date.now())
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"messages",filter:`room=eq.${room}`},async(p)=>{
      // fetch joined row for profile data
      const one=await sb.from("messages")
        .select("id,room,user_id,text,image_url,created_at,deleted,profiles(username,display_name,avatar_url)")
        .eq("id",p.new.id).single();
      if(one.data){ $("chat").insertAdjacentHTML("beforeend",drawMessage(one.data)); $("chat").scrollTop=$("chat").scrollHeight; }
    })
    .on("postgres_changes",{event:"UPDATE",schema:"public",table:"messages",filter:`room=eq.${room}`},async(p)=>{
      const one=await sb.from("messages")
        .select("id,room,user_id,text,image_url,created_at,deleted,profiles(username,display_name,avatar_url)")
        .eq("id",p.new.id).single();
      const old=document.getElementById("m-"+p.new.id);
      if(old && one.data) old.outerHTML=drawMessage(one.data);
    })
    .subscribe();
}

$("loginBtn").onclick=async()=>{
  try{
    const email=$("email").value.trim(), password=$("password").value;
    const r=await sb.auth.signInWithPassword({email,password});
    if(r.error) throw r.error;
    user=r.data.user;
    profile=await ensureProfile(user);
    showApp(); await join(); t("Logged in");
  }catch(err){$("authMsg").textContent=eMsg("login",err);}
};

$("registerBtn").onclick=async()=>{
  try{
    const email=$("email").value.trim(), password=$("password").value;
    const username=$("username").value.trim(), display=$("displayName").value.trim();
    const r=await sb.auth.signUp({email,password});
    if(r.error) throw r.error;
    if(!r.data.user){$("authMsg").textContent="Check email confirmation then login.";return;}
    user=r.data.user;
    profile=await ensureProfile(user,username,display||username);
    showApp(); await join(); t("Registered");
  }catch(err){$("authMsg").textContent=eMsg("register",err);}
};

$("logoutBtn").onclick=async()=>{await sb.auth.signOut();showAuth();t("Logged out");};
$("joinBtn").onclick=join;

$("saveProfileBtn").onclick=async()=>{
  try{
    let display_name=($("newDisplay").value.trim()||profile.display_name).slice(0,48);
    let avatar_url=profile.avatar_url||null;
    const f=$("avatarInput").files?.[0];
    if(f) avatar_url=await upload(f);
    const q=await sb.from("profiles").update({display_name,avatar_url}).eq("id",user.id);
    if(q.error) throw q.error;
    profile.display_name=display_name; profile.avatar_url=avatar_url;
    showApp(); t("Profile saved");
  }catch(err){t(eMsg("profile",err),"err");}
};

$("sendBtn").onclick=async()=>{
  try{
    const text=$("msg").value.trim();
    const f=$("imgInput").files?.[0];
    if(!text && !f){t("Write message or attach image.","err");return;}
    let image_url=null;
    if(f) image_url=await upload(f);

    const ins=await sb.from("messages").insert({
      room,user_id:user.id,text:text||null,image_url
    });
    if(ins.error) throw ins.error;

    $("msg").value=""; $("imgInput").value=""; $("imgFileName").textContent="No file";
  }catch(err){t(eMsg("send",err),"err");}
};

// Admin tools
$("muteBtn").onclick=async()=>adminOp("mute");
$("unmuteBtn").onclick=async()=>adminOp("unmute");
$("banBtn").onclick=async()=>adminOp("ban");
$("unbanBtn").onclick=async()=>adminOp("unban");

async function adminOp(type){
  const ip=$("targetIp").value.trim();
  if(!ip){$("adminMsg").textContent="Target IP required";return;}
  if(profile.role!=="admin"){t("Not admin","err");return;}
  try{
    if(type==="mute"){
      const sec=Math.max(1,Number($("muteSec").value||60));
      const until=new Date(Date.now()+sec*1000).toISOString();
      const q=await sb.from("ip_mutes").upsert({ip,muted_until:until,reason:"admin",updated_at:new Date().toISOString()});
      if(q.error) throw q.error;
      $("adminMsg").textContent=`Muted ${ip} for ${sec}s`;
    }else if(type==="unmute"){
      const q=await sb.from("ip_mutes").delete().eq("ip",ip); if(q.error) throw q.error;
      $("adminMsg").textContent=`Unmuted ${ip}`;
    }else if(type==="ban"){
      const q=await sb.from("ip_bans").upsert({ip,reason:"admin",created_at:new Date().toISOString()}); if(q.error) throw q.error;
      $("adminMsg").textContent=`Banned ${ip}`;
    }else{
      const q=await sb.from("ip_bans").delete().eq("ip",ip); if(q.error) throw q.error;
      $("adminMsg").textContent=`Unbanned ${ip}`;
    }
    t("Admin action done");
  }catch(err){$("adminMsg").textContent=eMsg("admin",err);}
}

// restore
(async()=>{
  const s=await sb.auth.getSession();
  if(!s.data.session?.user){showAuth();return;}
  try{
    user=s.data.session.user;
    profile=await ensureProfile(user);
    showApp(); await join();
  }catch(err){showAuth();t(eMsg("init",err),"err");}
})();
</script>
</body>
</html>
