<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Chat (Fixed No-Join)</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#0d1322; --panel:#151d33; --line:#2a3b62; --txt:#edf3ff; --muted:#a9b4ce;
      --pri:#69a7ff; --ok:#5cca8d; --err:#ff7070; --warn:#ffd06a;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
    .app{max-width:980px;margin:0 auto;padding:12px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px}
    .row{display:flex;gap:8px;flex-wrap:wrap}
    input,textarea,button{
      border-radius:10px;padding:10px;border:1px solid #334977;background:#0f172b;color:var(--txt);font-size:14px
    }
    input,textarea{flex:1;min-width:140px}
    button{border:none;cursor:pointer;background:var(--pri);color:#081428;font-weight:700}
    button.ghost{background:#23385f;color:#deebff}
    button.danger{background:var(--err);color:#2b0909}
    button.warn{background:var(--warn);color:#3f2d00}
    .hidden{display:none!important}
    .muted{font-size:12px;color:var(--muted)}
    .chat{
      height:52vh;overflow:auto;border:1px solid var(--line);border-radius:12px;
      padding:10px;background:#0e162b;display:flex;flex-direction:column;gap:8px
    }
    .msg{border:1px solid #2d3f68;background:#1a2748;border-radius:10px;padding:8px}
    .msg.deleted{opacity:.66;background:#2a3146}
    .meta{display:flex;justify-content:space-between;gap:8px;font-size:12px;color:#c8d4ef;margin-bottom:6px}
    .avatar{width:22px;height:22px;border-radius:50%;border:1px solid #48629b;object-fit:cover;vertical-align:middle;margin-right:6px}
    .text{white-space:pre-wrap;word-break:break-word}
    .img{max-width:220px;max-height:220px;border:1px solid #3a5082;border-radius:8px;margin-top:8px}
    .actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
    .actions button{padding:6px 9px;font-size:12px}
    .fileui{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .fname{font-size:12px;color:var(--muted);max-width:230px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .toastWrap{position:fixed;right:12px;bottom:12px;display:flex;flex-direction:column;gap:8px;z-index:9999}
    .toast{min-width:220px;max-width:330px;padding:10px 12px;border-radius:10px;border:1px solid #415886;background:#172643}
    .toast.ok{background:#143126;border-color:#2f7d52}
    .toast.err{background:#3a1818;border-color:#8d4040}
    .toast.warn{background:#3f3216;border-color:#8a6e33}
  </style>
</head>
<body>
<div class="app">
  <div class="card" id="authCard">
    <h3>Login / Register</h3>
    <div class="row">
      <input id="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Password" />
    </div>
    <div class="row">
      <input id="regUsername" placeholder="Username (register)" />
      <input id="regDisplay" placeholder="Display Name (register)" />
    </div>
    <div class="row">
      <button id="btnLogin">Login</button>
      <button id="btnRegister" class="ghost">Register</button>
    </div>
    <div id="authMsg" class="muted"></div>
  </div>

  <div class="card hidden" id="appCard" style="margin-top:10px">
    <div class="row">
      <input id="roomInput" value="lobby" style="max-width:180px" />
      <button id="btnJoin" class="ghost">Join Room</button>
      <button id="btnLogout" class="danger">Logout</button>
    </div>

    <div class="row">
      <input id="newDisplay" placeholder="New display name" />
      <input id="avatarFile" type="file" accept="image/*" hidden />
      <button id="btnPickAvatar" type="button" class="ghost">Choose Avatar</button>
      <span id="avatarName" class="fname">No file chosen</span>
      <button id="btnSaveProfile" class="ghost">Save Profile</button>
    </div>

    <div id="meInfo" class="muted"></div>

    <div id="chat" class="chat"></div>

    <div class="row" style="margin-top:8px">
      <textarea id="msgText" placeholder="Type message..."></textarea>
    </div>
    <div class="row">
      <input id="msgFile" type="file" accept="image/*" hidden />
      <button id="btnPickMsg" type="button" class="ghost">Attach Image</button>
      <span id="msgFileName" class="fname">No file chosen</span>
      <button id="btnSend">Send</button>
    </div>

    <div id="adminBox" class="hidden" style="margin-top:10px;border-top:1px solid #2c3f69;padding-top:10px">
      <h4 style="margin:0 0 8px">Admin</h4>
      <div class="row">
        <input id="targetIp" placeholder="Target IP" />
        <input id="muteSec" type="number" value="60" style="max-width:120px" />
      </div>
      <div class="row">
        <button id="btnMute" class="warn">Mute IP</button>
        <button id="btnUnmute" class="ghost">Unmute IP</button>
        <button id="btnBan" class="danger">Ban IP</button>
        <button id="btnUnban" class="ghost">Unban IP</button>
      </div>
      <div id="adminMsg" class="muted"></div>
    </div>
  </div>
</div>

<div id="toastWrap" class="toastWrap"></div>

<script>
const SUPABASE_URL = "https://lflkpziiwnoamvtrbcil.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_tFvlhmTEDV3SOSVp0JvVzg_KHXFiDNb";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const $ = (id) => document.getElementById(id);
let me = null, myProfile = null, room = "lobby", channel = null;
let profileMap = new Map(); // user_id -> profile

const toast = (msg, type="ok", ms=2800) => {
  const d = document.createElement("div");
  d.className = `toast ${type}`;
  d.textContent = msg;
  $("toastWrap").appendChild(d);
  setTimeout(()=>d.remove(), ms);
};
const esc = (s="") => String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
const when = (t) => new Date(t).toLocaleString();
const errTxt = (ctx,e) => `${ctx}: ${e?.message || JSON.stringify(e)}`;

function setAuthMsg(msg, isErr=false){
  $("authMsg").textContent = msg;
  $("authMsg").style.color = isErr ? "var(--err)" : "var(--muted)";
}
function setAdminMsg(msg, isErr=false){
  $("adminMsg").textContent = msg;
  $("adminMsg").style.color = isErr ? "var(--err)" : "var(--muted)";
}

function showAuth(){
  $("authCard").classList.remove("hidden");
  $("appCard").classList.add("hidden");
  $("chat").innerHTML = "";
  if(channel){ sb.removeChannel(channel); channel = null; }
}
function showApp(){
  $("authCard").classList.add("hidden");
  $("appCard").classList.remove("hidden");
  $("adminBox").classList.toggle("hidden", myProfile?.role !== "admin");
  $("meInfo").innerHTML = `You: <b>${esc(myProfile?.display_name || "")}</b> @${esc(myProfile?.username || "")} (${esc(myProfile?.role || "user")})`;
}

$("btnPickAvatar").onclick = () => $("avatarFile").click();
$("btnPickMsg").onclick = () => $("msgFile").click();
$("avatarFile").addEventListener("change", ()=> $("avatarName").textContent = $("avatarFile").files?.[0]?.name || "No file chosen");
$("msgFile").addEventListener("change", ()=> $("msgFileName").textContent = $("msgFile").files?.[0]?.name || "No file chosen");

async function ensureProfile(user, uName="", dName=""){
  const one = await sb.from("profiles").select("*").eq("id", user.id).maybeSingle();
  if(one.error) throw one.error;
  if(one.data) return one.data;

  const username = (uName || user.email.split("@")[0] || ("u"+Date.now())).slice(0,24);
  const display_name = (dName || username).slice(0,48);
  const ins = await sb.from("profiles").insert({
    id: user.id, username, display_name, role: "user"
  }).select("*").single();
  if(ins.error) throw ins.error;
  return ins.data;
}

async function uploadImage(file){
  const ext = (file.name.split(".").pop() || "jpg").toLowerCase();
  const path = `${me.id}/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
  const up = await sb.storage.from("chat-media").upload(path, file, { upsert: false });
  if(up.error) throw up.error;
  return sb.storage.from("chat-media").getPublicUrl(path).data.publicUrl;
}

async function loadProfileMap(){
  const q = await sb.from("profiles").select("id,username,display_name,avatar_url,role");
  if(q.error) throw q.error;
  profileMap = new Map((q.data || []).map(p => [p.id, p]));
}

function renderMessage(m){
  const p = profileMap.get(m.user_id) || {};
  const name = p.display_name || "user";
  const uname = p.username || "unknown";
  const avatar = p.avatar_url ? `<img class="avatar" src="${esc(p.avatar_url)}" alt="a">` : "";
  const mine = me && m.user_id === me.id;
  const admin = myProfile?.role === "admin";
  const canDelete = mine || admin;

  return `
    <div class="msg ${m.deleted ? "deleted" : ""}" id="msg-${m.id}">
      <div class="meta">
        <span>${avatar}<b>${esc(name)}</b> @${esc(uname)}</span>
        <span>${when(m.created_at)}</span>
      </div>
      <div class="text">${m.deleted ? "<i>[deleted]</i>" : esc(m.text || "")}</div>
      ${(!m.deleted && m.image_url) ? `<img class="img" src="${esc(m.image_url)}" alt="img">` : ""}
      <div class="actions">
        ${canDelete ? `<button class="ghost" data-del="${m.id}">Delete</button>` : ""}
      </div>
    </div>
  `;
}

function wireDeleteButtons(){
  document.querySelectorAll("[data-del]").forEach(btn => {
    btn.onclick = async () => {
      const id = btn.getAttribute("data-del");
      const q = await sb.from("messages").update({ deleted:true, text:null, image_url:null }).eq("id", id);
      if(q.error) toast(errTxt("delete", q.error), "err", 4000);
      else toast("Message deleted", "ok");
    };
  });
}

async function loadMessages(){
  await loadProfileMap();

  const q = await sb.from("messages")
    .select("id,room,user_id,text,image_url,created_at,deleted")
    .eq("room", room)
    .order("created_at", { ascending: true })
    .limit(200);

  if(q.error){
    toast(errTxt("loadMessages", q.error), "err", 4500);
    return;
  }

  $("chat").innerHTML = "";
  (q.data || []).forEach(m => $("chat").insertAdjacentHTML("beforeend", renderMessage(m)));
  wireDeleteButtons();
  $("chat").scrollTop = $("chat").scrollHeight;
}

async function joinRoom(){
  room = ($("roomInput").value.trim() || "lobby").slice(0,64);
  await loadMessages();

  if(channel) await sb.removeChannel(channel);
  channel = sb.channel(`room-${room}-${Date.now()}`)
    .on("postgres_changes", { event:"INSERT", schema:"public", table:"messages", filter:`room=eq.${room}` }, async (payload) => {
      const uid = payload.new.user_id;
      if(!profileMap.has(uid)){
        const qp = await sb.from("profiles").select("id,username,display_name,avatar_url,role").eq("id", uid).maybeSingle();
        if(qp.data) profileMap.set(uid, qp.data);
      }
      $("chat").insertAdjacentHTML("beforeend", renderMessage(payload.new));
      wireDeleteButtons();
      $("chat").scrollTop = $("chat").scrollHeight;
    })
    .on("postgres_changes", { event:"UPDATE", schema:"public", table:"messages", filter:`room=eq.${room}` }, async (payload) => {
      const uid = payload.new.user_id;
      if(!profileMap.has(uid)){
        const qp = await sb.from("profiles").select("id,username,display_name,avatar_url,role").eq("id", uid).maybeSingle();
        if(qp.data) profileMap.set(uid, qp.data);
      }
      const old = document.getElementById(`msg-${payload.new.id}`);
      if(old) old.outerHTML = renderMessage(payload.new);
      wireDeleteButtons();
    })
    .subscribe();
}

$("btnLogin").onclick = async () => {
  setAuthMsg("");
  try{
    const email = $("email").value.trim();
    const password = $("password").value;
    const r = await sb.auth.signInWithPassword({ email, password });
    if(r.error) throw r.error;
    me = r.data.user;
    myProfile = await ensureProfile(me);
    showApp();
    await joinRoom();
    toast("Logged in", "ok");
  }catch(e){
    setAuthMsg(errTxt("login", e), true);
  }
};

$("btnRegister").onclick = async () => {
  setAuthMsg("");
  try{
    const email = $("email").value.trim();
    const password = $("password").value;
    const username = $("regUsername").value.trim();
    const display = $("regDisplay").value.trim() || username;
    const r = await sb.auth.signUp({ email, password });
    if(r.error) throw r.error;
    if(!r.data.user){
      setAuthMsg("Check email confirmation then login.", false);
      return;
    }
    me = r.data.user;
    myProfile = await ensureProfile(me, username, display);
    showApp();
    await joinRoom();
    toast("Registered", "ok");
  }catch(e){
    setAuthMsg(errTxt("register", e), true);
  }
};

$("btnLogout").onclick = async () => {
  await sb.auth.signOut();
  showAuth();
  toast("Logged out", "ok");
};

$("btnJoin").onclick = joinRoom;

$("btnSaveProfile").onclick = async () => {
  try{
    let display_name = ($("newDisplay").value.trim() || myProfile.display_name).slice(0,48);
    let avatar_url = myProfile.avatar_url || null;
    const f = $("avatarFile").files?.[0];
    if(f) avatar_url = await uploadImage(f);

    const q = await sb.from("profiles").update({ display_name, avatar_url }).eq("id", me.id);
    if(q.error) throw q.error;

    myProfile.display_name = display_name;
    myProfile.avatar_url = avatar_url;
    profileMap.set(me.id, myProfile);
    showApp();
    await loadMessages();
    toast("Profile updated", "ok");
  }catch(e){
    toast(errTxt("profile", e), "err", 4500);
  }
};

$("btnSend").onclick = async () => {
  try{
    const text = $("msgText").value.trim();
    const file = $("msgFile").files?.[0];
    if(!text && !file){
      toast("Write message or attach image", "warn");
      return;
    }

    let image_url = null;
    if(file) image_url = await uploadImage(file);

    const ins = await sb.from("messages").insert({
      room,
      user_id: me.id,
      text: text || null,
      image_url
    });
    if(ins.error) throw ins.error;

    $("msgText").value = "";
    $("msgFile").value = "";
    $("msgFileName").textContent = "No file chosen";
  }catch(e){
    toast(errTxt("send", e), "err", 4500);
  }
};

// Admin tools
$("btnMute").onclick = async ()=>{
  const ip = $("targetIp").value.trim();
  const sec = Math.max(1, Number($("muteSec").value || 60));
  if(!ip){ setAdminMsg("Target IP required", true); return; }
  const muted_until = new Date(Date.now() + sec*1000).toISOString();
  const q = await sb.from("ip_mutes").upsert({ ip, muted_until, reason:"admin", updated_at:new Date().toISOString() });
  if(q.error){ setAdminMsg(errTxt("mute", q.error), true); return; }
  setAdminMsg(`Muted ${ip} for ${sec}s`);
};

$("btnUnmute").onclick = async ()=>{
  const ip = $("targetIp").value.trim();
  if(!ip){ setAdminMsg("Target IP required", true); return; }
  const q = await sb.from("ip_mutes").delete().eq("ip", ip);
  if(q.error){ setAdminMsg(errTxt("unmute", q.error), true); return; }
  setAdminMsg(`Unmuted ${ip}`);
};

$("btnBan").onclick = async ()=>{
  const ip = $("targetIp").value.trim();
  if(!ip){ setAdminMsg("Target IP required", true); return; }
  const q = await sb.from("ip_bans").upsert({ ip, reason:"admin", created_at:new Date().toISOString() });
  if(q.error){ setAdminMsg(errTxt("ban", q.error), true); return; }
  setAdminMsg(`Banned ${ip}`);
};

$("btnUnban").onclick = async ()=>{
  const ip = $("targetIp").value.trim();
  if(!ip){ setAdminMsg("Target IP required", true); return; }
  const q = await sb.from("ip_bans").delete().eq("ip", ip);
  if(q.error){ setAdminMsg(errTxt("unban", q.error), true); return; }
  setAdminMsg(`Unbanned ${ip}`);
};

// Session restore
(async ()=>{
  const s = await sb.auth.getSession();
  if(!s.data.session?.user){ showAuth(); return; }
  try{
    me = s.data.session.user;
    myProfile = await ensureProfile(me);
    showApp();
    await joinRoom();
  }catch(e){
    showAuth();
    toast(errTxt("init", e), "err", 4500);
  }
})();
</script>
</body>
</html>
