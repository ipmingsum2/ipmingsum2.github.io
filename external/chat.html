<!doctype html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CHATBOX</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>

  <style>
    :root{--bg:#0b1220;--panel:#141d32;--line:#2a3c63;--txt:#edf3ff;--muted:#a8b5d2;--primary:#68a8ff;--ok:#59ca8e;--warn:#ffd06a;--danger:#ff7171;--chip:#223a65}
    *{box-sizing:border-box}
    @keyframes rainbow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
	.default-rainbow {
		background: linear-gradient(to right, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff); 
		background-size: 200% auto;
		-webkit-background-clip: text; 
		-webkit-text-fill-color: transparent;
		animation: rainbow 3s linear infinite; 
	}
    .animated-rainbow {
      background: linear-gradient(to left, #f00, #ff2b00, #f50, #ff8000, #fa0, #ffd500, #ff0, #d4ff00, #af0, #80ff00, #5f0, #2bff00, #0f0, #00ff2a, #0f5, #00ff80, #0fa, #00ffd5, #0ff, #00d5ff, #0af, #0080ff, #05f, #002aff, #00f, #2b00ff, #50f, #8000ff, #a0f, #d400ff, #f0f, #ff00d4, #f0a, #ff0080, #f05, #ff002b, #f00);
      animation: rainbow-move-left-right 5s linear infinite alternate;
      -webkit-background-clip: text;
      background-clip: text;
     -webkit-text-fill-color: transparent;
  }
  @keyframes rainbow-move-left-right {
      0% {background-position: 0 0    }
      100% {background-position: -500px 0}
  }
    body{margin:0;background:var(--bg);color:var(--txt);font-family:system-ui}
    .app{max-width:1200px;margin:0 auto;padding:12px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .col{display:flex;flex-direction:column;gap:8px}
    input,textarea,button{border-radius:10px;font-size:14px;padding:10px 12px;border:1px solid #355083;background:#0e182d;color:var(--txt)}
    input,textarea{flex:1;min-width:140px}
    textarea{min-height:70px;resize:vertical}
    button{border:none;cursor:pointer;background:var(--primary);color:#081428;font-weight:700}
    button.ghost{background:#24406d;color:#e2ecff}
    button.warn{background:var(--warn);color:#3c2f00}
    button.danger{background:var(--danger);color:#300909}
    .hidden{display:none!important}
    .muted{font-size:12px;color:var(--muted)}
    .titlebar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .chip{display:inline-block;font-size:11px;padding:3px 8px;border-radius:999px;background:var(--chip)}
    .chip.admin{background:#5f4115;color:#ffdca0}
    .layout{display:grid;grid-template-columns:1fr;gap:10px}
    @media(min-width:980px){.layout{grid-template-columns:2fr 1fr}}
    .chat{height:56vh;overflow:auto;border:1px solid var(--line);border-radius:12px;padding:10px;background:#0d172c;display:flex;flex-direction:column;gap:8px}
    .msg{border:1px solid #2b406a;background:#17274a;border-radius:10px;padding:8px;position:relative}
    .msg.deleted{opacity:.65;background:#2a3248}
    .meta{display:flex;justify-content:space-between;gap:8px;font-size:12px;color:#cad5f1;margin-bottom:6px}
    .avatar{width:22px;height:22px;border-radius:50%;object-fit:cover;border:1px solid #4b67a5;vertical-align:middle;margin-right:6px}
    .body{word-break:break-word}
    .body img{max-width:100%}
    .iframe-msg{max-width:100%;max-height:360px;border:1px solid #3f578c;border-radius:8px;margin-top:8px;background:#07101f}
    .img,.video{max-width:260px;max-height:260px;border-radius:8px;border:1px solid #3f578c;margin-top:8px}
    .audio{width:min(100%,320px);margin-top:8px}
    .actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
    .actions button{font-size:12px;padding:6px 9px}
    .admin-dot{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:8px;background:#2a426f;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;cursor:pointer}
    .menu{position:fixed;z-index:10002;background:#182749;border:1px solid #365287;border-radius:10px;padding:6px;min-width:170px;box-shadow:0 10px 24px rgba(0,0,0,.35)}
    .menu button{width:100%;text-align:left;background:transparent;color:#e8f0ff;padding:8px;border-radius:8px}
    .menu button:hover{background:#2a416d}
    .file-ui{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .fname{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;color:var(--muted)}
    .toast-wrap{position:fixed;right:12px;bottom:12px;z-index:9999;display:flex;flex-direction:column;gap:8px}
    .toast{min-width:220px;max-width:350px;border-radius:10px;padding:10px 12px;border:1px solid #466193;background:#162746;color:#ecf3ff}
    .toast.ok{background:#123125;border-color:#2f7d52}
    .toast.err{background:#3b1919;border-color:#8f4141}
    .toast.warn{background:#3f3216;border-color:#8b6d32}
    .tabs{display:flex;gap:6px;flex-wrap:wrap}
    .tabbtn{background:#223a65;color:#dce9ff}
    .tabbtn.active{background:#68a8ff;color:#0a1630}
    .tabpane{display:none}
    .tabpane.active{display:block}
    .list{max-height:180px;overflow:auto;border:1px solid #355083;border-radius:10px;padding:8px}
    .list-item{display:flex;justify-content:space-between;gap:8px;padding:6px;border-bottom:1px solid #2a3d67}
    .room-actions{display:flex;gap:4px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    .room-actions button{padding:6px 8px;font-size:12px}
    .list-item:last-child{border-bottom:none}
    .toolbar{display:flex;gap:6px;flex-wrap:wrap}
    .toolbar button{padding:6px 8px;font-size:12px}
    .debug{max-height:160px;overflow:auto;border:1px dashed #3a507f;border-radius:10px;padding:8px;background:#0f1931;font-size:12px;white-space:pre-wrap}
    .settings-card{margin-top:8px;border:1px solid #355083;border-radius:12px;padding:10px;background:#101b33}
    .switch{position:relative;display:inline-block;width:52px;height:30px}
    .switch input{opacity:0;width:0;height:0}
    .slider{position:absolute;cursor:pointer;inset:0;background:#435371;border-radius:999px;transition:.25s}
    .slider:before{position:absolute;content:"";height:24px;width:24px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.25s;box-shadow:0 2px 8px rgba(0,0,0,.35)}
    .switch input:checked + .slider{background:#68a8ff}
    .switch input:checked + .slider:before{transform:translateX(22px)}
    .lock{color:#ffd06a;margin-right:4px}
  </style>
</head>
<body>
<div class="app">
  <div class="titlebar">
    <h2 style="margin:0">CHATBOX</h2>
    <div id="status" class="muted">Not logged in</div>
  </div>

  <div id="authCard" class="card">
    <h3 style="margin-top:0">Login / Register CHATBOX</h3>
    <div class="row">
      <input id="email" placeholder="Email">
      <input id="password" type="password" placeholder="Password">
    </div>
    <div class="row">
      <input id="regUsername" placeholder="Username (register)">
      <input id="regDisplay" placeholder="Display Name (register)">
    </div>
    <div class="row">
      <button id="btnLogin">Login</button>
      <button id="btnRegister" class="ghost">Register</button>
    </div>
    <div id="authMsg" class="muted"></div>
  </div>

  <div id="appCard" class="hidden layout">
    <div class="card">
      <div class="row">
        <span id="roleChip" class="chip">user</span>
        <input id="roomInput" value="lobby" style="max-width:180px">
        <button id="btnJoin" class="ghost">Join Room</button>
        <button id="btnShowChannelSettings" class="ghost hidden">Channel Settings</button>
        <button id="btnLogout" class="danger">Logout</button>
      </div>

      <div id="meInfo" class="muted" style="margin-top:6px"></div>

      <div class="row" style="margin-top:8px">
        <div style="flex:1">
          <div class="muted">Rooms</div>
          <div id="roomList" class="list"></div>
        </div>
      </div>

      <div id="channelSettings" class="settings-card hidden">
        <div class="row" style="justify-content:space-between">
          <div>
            <b>Channel settings</b>
            <div id="channelSettingsInfo" class="muted"></div>
          </div>
          <label class="switch" title="Private channel">
            <input id="channelPrivateToggle" type="checkbox">
            <span class="slider"></span>
          </label>
        </div>
        <div class="row" style="margin-top:8px">
          <input id="channelRenameInput" placeholder="Rename channel">
          <button id="btnRenameChannel" class="ghost">Rename</button>
          <button id="btnDeleteChannel" class="danger">Delete Channel</button>
        </div>
        <div id="privateMemberControls" class="hidden" style="margin-top:8px">
          <div class="row">
            <input id="privateMemberUsername" placeholder="Add username to private channel">
            <button id="btnAddPrivateMember" class="ghost">Add User</button>
          </div>
          <div class="muted" style="margin-top:8px">Private members</div>
          <div id="privateMemberList" class="list" style="margin-top:6px"></div>
        </div>
        <div id="channelSettingsMsg" class="muted" style="margin-top:6px"></div>
      </div>

      <div class="chat" id="chat" style="margin-top:10px"></div>

      <div style="margin-top:10px">
        <div class="toolbar">
          <button class="ghost" data-md="**bold**">Bold</button>
          <button class="ghost" data-md="*italic*">Italic</button>
          <button class="ghost" data-md="<u>underline</u>">Underline</button>
          <button class="ghost" data-md="`code`">Code</button>
          <button class="ghost" data-md="> quote">Quote</button>
          <button class="ghost" data-md="[title](https://example.com)">Link</button>
          <button class="ghost" data-md="\(x^2+y^2=z^2\)">LaTeX</button>
          <button class="ghost" data-md="\[\int_0^1 x^2\,dx\]">Block LaTeX</button>
          <button class="ghost" data-md='!iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" width="560" height="315"!'>Iframe</button>
        </div>
        <textarea id="msgText" placeholder="Write message with markdown/latex..."></textarea>
        <div class="row">
          <input id="msgFile" type="file" accept="image/*,audio/*,video/*,.mp3,.wav,.ogg,.oga,.m4a,.aac,.flac,.opus,.weba,.mp4,.webm,.mov,.m4v,.avi,.mkv,.ogv,.3gp,.3g2" hidden>
          <button id="btnPickMsg" class="ghost" type="button">Attach Media</button>
          <span id="msgFileName" class="fname">No file chosen</span>
          <button id="btnSend">Send</button>
        </div>
      </div>
    </div>

    <div class="col">
      <div class="card">
        <h3 style="margin-top:0">Profile</h3>
        <input id="newDisplay" placeholder="New display name">
        <div class="file-ui">
          <input id="avatarFile" type="file" accept="image/*" hidden>
          <button id="btnPickAvatar" class="ghost" type="button">Choose Avatar</button>
          <span id="avatarFileName" class="fname">No file chosen</span>
        </div>
        <button id="btnSaveProfile" class="ghost">Save Profile</button>
      </div>

      <div class="card">
        <div class="tabs">
          <button class="tabbtn active" data-tab="ann">Announcements</button>
          <button class="tabbtn" data-tab="admin">Admin</button>
          <button class="tabbtn" data-tab="debug">Debug</button>
        </div>

        <div id="tab-ann" class="tabpane active" style="margin-top:8px">
          <div id="annList" class="list"></div>
          <div id="annComposer" class="hidden" style="margin-top:8px">
            <input id="annTitle" placeholder="Announcement title">
            <textarea id="annBody" placeholder="Announcement body"></textarea>
            <button id="btnPublishAnn">Publish Announcement</button>
          </div>
        </div>

        <div id="tab-admin" class="tabpane" style="margin-top:8px">
          <div id="adminOnly" class="hidden">
            <h4 style="margin:0 0 6px">Moderation</h4>
            <div class="row">
              <input id="targetUsername" placeholder="Target username">
							<input id="muteSec" type="number" value="60" style="max-width:120px">
            </div>
            <div class="row">
              <button id="btnMute" class="warn">Mute</button>
              <button id="btnUnmute" class="ghost">Unmute</button>
              <button id="btnBan" class="danger">Ban</button>
              <button id="btnUnban" class="ghost">Unban</button>
            </div>
            <div id="adminMsg" class="muted"></div>

            <div id="rootAdminTools" class="hidden" style="margin-top:10px;border-top:1px solid #2a3d67;padding-top:10px">
              <h4 style="margin:0 0 6px">Root-only Admin Manager</h4>
              <div class="muted">Only @root / root@local.chat can see this.</div>
              <div class="row" style="margin-top:8px">
                <input id="adminRoleUsername" placeholder="Username to admin/unadmin">
              </div>
              <div class="row">
                <button id="btnGiveAdmin" class="ghost">Give Admin</button>
                <button id="btnRemoveAdmin" class="danger">Remove Admin</button>
              </div>
              <div id="rootAdminMsg" class="muted"></div>
            </div>

            <h4 style="margin:10px 0 6px">Message Filters</h4>
            <div class="row">
              <input id="filterInput" placeholder="blocked word/phrase">
              <button id="btnAddFilter">Add Filter</button>
            </div>
            <div id="filterList" class="list" style="margin-top:8px"></div>
          </div>
          <div id="adminNotAllowed" class="muted">Admin only. Ask Alvin for it.</div>
        </div>

        <div id="tab-debug" class="tabpane" style="margin-top:8px">
          <button id="btnClearDebug" class="ghost">Clear Debug</button>
          <div id="debug" class="debug" style="margin-top:8px"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toastWrap" class="toast-wrap"></div>
<div id="menuHost"></div>

<script>
const SUPABASE_URL = "https://lflkpziiwnoamvtrbcil.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_tFvlhmTEDV3SOSVp0JvVzg_KHXFiDNb";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const $ = id => document.getElementById(id);

let me = null, myProfile = null, room = "lobby", channel = null, currentChannel = null;
let profileMap = new Map(), filters = [];

function toast(msg, type = "ok", ms = 3200) {
  const d = document.createElement("div");
  d.className = `toast ${type}`;
  d.textContent = msg;
  $("toastWrap").appendChild(d);
  setTimeout(() => d.remove(), ms);
}

function debugLog(label, obj) {
  $("debug").textContent = `[${new Date().toLocaleTimeString()}] ${label}: ${typeof obj === "string" ? obj : JSON.stringify(obj)}\n` + $("debug").textContent;
}

function esc(s = "") {
  return String(s).replace(/[&<>"']/g, m => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#39;"
  }[m]));
}

function errText(ctx, e) {
  return `${ctx}: ${e?.message || JSON.stringify(e)}`;
}

function setAuthMsg(msg, err = false) {
  $("authMsg").textContent = msg;
  $("authMsg").style.color = err ? "var(--danger)" : "var(--muted)";
}

function setAdminMsg(msg, err = false) {
  $("adminMsg").textContent = msg;
  $("adminMsg").style.color = err ? "var(--danger)" : "var(--muted)";
}

function fmt(ts) {
  try { return new Date(ts).toLocaleString(); }
  catch { return ts; }
}

function iframeEmbedHTML(rawAttrs = "") {
  const attrs = {};
  rawAttrs.replace(/(src|width|height)="([^"]*)"/gi, (_, key, value) => {
    attrs[key.toLowerCase()] = value.trim();
    return "";
  });

  let src = attrs.src || "https://www.youtube.com/embed/dQw4w9WgXcQ";
  try {
    const url = new URL(src, location.href);
    if (!["http:", "https:"].includes(url.protocol)) throw new Error("bad protocol");
    src = url.href;
  } catch {
    src = "https://www.youtube.com/embed/dQw4w9WgXcQ";
  }

  const width = Math.min(Math.max(parseInt(attrs.width || "560", 10) || 560, 200), 640);
  const height = Math.min(Math.max(parseInt(attrs.height || "315", 10) || 315, 120), 360);
  return `<iframe class="iframe-msg" src="${esc(src)}" width="${width}" height="${height}" loading="lazy" allowfullscreen referrerpolicy="no-referrer"></iframe>`;
}

function parseRich(text = "") {
  const withIframes = String(text).replace(/!iframe\s*([^!]*)!/gi, (_, attrs) => iframeEmbedHTML(attrs));
  const md = marked.parse(withIframes, { breaks: true, gfm: true });
  return DOMPurify.sanitize(md, {
    ADD_TAGS: ["u", "iframe"],
    ADD_ATTR: ["src", "width", "height", "loading", "allowfullscreen", "referrerpolicy", "class"]
  });
}

function renderMathIn(el) {
  if (!window.renderMathInElement || !el) return;
  renderMathInElement(el, {
    delimiters: [
      { left: "\\[", right: "\\]", display: true },
      { left: "\\(", right: "\\)", display: false },
      { left: "$$", right: "$$", display: true },
      { left: "$", right: "$", display: false }
    ],
    throwOnError: false
  });
}

function showAuth() {
  $("authCard").classList.remove("hidden");
  $("appCard").classList.add("hidden");
  $("status").textContent = "Not logged in";
  currentChannel = null;
  $("channelSettings").classList.add("hidden");
  if (channel) {
    sb.removeChannel(channel);
    channel = null;
  }
}

function showApp() {
  $("authCard").classList.add("hidden");
  $("appCard").classList.remove("hidden");
  $("status").textContent = `Logged in: ${myProfile?.display_name || me?.email || "user"}`;
  $("meInfo").innerHTML = `You: <b>${esc(myProfile?.display_name || "")}</b> @${esc(myProfile?.username || "")} (${esc(myProfile?.role || "user")})`;

  const rc = $("roleChip");
  rc.textContent = myProfile?.role || "user";
  rc.className = "chip" + (myProfile?.role === "admin" ? " admin" : "");

  const isAdmin = myProfile?.role === "admin";
  $("adminOnly").classList.toggle("hidden", !isAdmin);
  $("adminNotAllowed").classList.toggle("hidden", isAdmin);
  $("annComposer").classList.toggle("hidden", !isAdmin);
  $("rootAdminTools").classList.toggle("hidden", !isRootOwner());
}

async function requireAuthedUser() {
  const gu = await sb.auth.getUser();
  if (!gu.data.user) throw new Error("Session expired");
  return gu.data.user;
}

function fallbackProfileForUser(user, uh = "", dh = "") {
  const emailName = (user?.email || "").split("@")[0];
  const idSuffix = String(user?.id || Date.now()).replace(/[^a-z0-9]/gi, "").slice(0, 8);
  const username = (uh || emailName || `user${idSuffix}`)
    .toLowerCase()
    .replace(/[^a-z0-9_-]+/g, "_")
    .replace(/^_+|_+$/g, "")
    .slice(0, 24) || `user${idSuffix}`;
  const display_name = (dh || username || user?.email || "User").slice(0, 48);
  return { id: user?.id, username, display_name, avatar_url: null, role: "user" };
}

async function ensureProfileAfterLogin(user, uh = "", dh = "") {
  const fallbackProfile = fallbackProfileForUser(user, uh, dh);

  const one = await sb.from("profiles").select("*").eq("id", user.id).maybeSingle();
  if (one.error) {
    debugLog("profile.load", one.error);
    toast("Login worked, but profile loading failed. Using a temporary profile.", "warn", 5500);
    return fallbackProfile;
  }
  if (one.data) return { ...fallbackProfile, ...one.data };

  const ins = await sb.from("profiles")
    .insert({
      id: user.id,
      username: fallbackProfile.username,
      display_name: fallbackProfile.display_name,
      role: fallbackProfile.role
    })
    .select("*")
    .single();

  if (ins.error) {
    debugLog("profile.create", ins.error);
    toast("Login worked, but profile creation failed. Using a temporary profile.", "warn", 5500);
    return fallbackProfile;
  }
  return { ...fallbackProfile, ...ins.data };
}

async function uploadFile(file, allowedKinds = ["image", "audio", "video"]) {
  const authUser = await requireAuthedUser();
  const kind = (file.type || "").split("/")[0];
  const ext = (file.name.split(".").pop() || kind || "file").toLowerCase().replace(/[^a-z0-9]/g, "").slice(0, 12) || "file";
  const extKind = mediaKindFromExtension(ext);
  if (!allowedKinds.includes(kind) && !allowedKinds.includes(extKind)) {
    throw new Error(`Unsupported file type: ${file.type || file.name}`);
  }
  const path = `${authUser.id}/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
  const up = await sb.storage.from("chat-media").upload(path, file, {
    upsert: false,
    contentType: file.type || "application/octet-stream"
  });
  if (up.error) throw up.error;
  return sb.storage.from("chat-media").getPublicUrl(path).data.publicUrl;
}

async function uploadImage(file) {
  return uploadFile(file, ["image"]);
}

async function uploadMedia(file) {
  return uploadFile(file, ["image", "audio", "video"]);
}

function mediaKindFromExtension(ext = "") {
  if (["mp3", "wav", "ogg", "oga", "m4a", "aac", "flac", "opus", "weba"].includes(ext)) return "audio";
  if (["mp4", "webm", "mov", "m4v", "avi", "mkv", "ogv", "3gp", "3g2"].includes(ext)) return "video";
  return "image";
}

function mediaKindFromUrl(url = "") {
  const clean = String(url).split("?")[0].toLowerCase();
  return mediaKindFromExtension(clean.split(".").pop() || "");
}

function attachmentHTML(url) {
  if (!url) return "";
  const safeUrl = esc(url);
  const kind = mediaKindFromUrl(url);
  if (kind === "audio") return `<audio class="audio" controls preload="metadata" src="${safeUrl}"></audio>`;
  if (kind === "video") return `<video class="video" controls preload="metadata" src="${safeUrl}"></video>`;
  return `<img class="img" src="${safeUrl}">`;
}

async function loadProfileMap() {
  const q = await sb.from("profiles").select("id,username,display_name,avatar_url,role");
  if (q.error) throw q.error;
  profileMap = new Map((q.data || []).map(p => [p.id, p]));
}

function channelSlug(name = "lobby") {
  const slug = String(name || "lobby")
    .trim()
    .toLowerCase()
    .replace(/[^a-z0-9_-]+/g, "-")
    .replace(/^-+|-+$/g, "")
    .slice(0, 48);
  return slug || "lobby";
}

function canManageChannel(ch = currentChannel) {
  return !!(ch && (myProfile?.role === "admin" || ch.created_by === me?.id));
}

async function getChannelMemberIds(channelId) {
  const q = await sb.from("channel_members").select("user_id").eq("channel_id", channelId);
  if (q.error) throw q.error;
  return new Set((q.data || []).map(row => row.user_id));
}

async function canEnterChannel(ch) {
  if (!ch?.is_private) return true;
  if (myProfile?.role === "admin" || ch.created_by === me?.id) return true;
  const members = await getChannelMemberIds(ch.id);
  return members.has(me?.id);
}

async function ensureChannelByInput(inputName) {
  const requestedName = (inputName || "lobby").trim().slice(0, 64) || "lobby";
  const requestedSlug = channelSlug(requestedName);
  const channelColumns = "id,name,created_by,is_private,created_at";

  let q = await sb.from("channels")
    .select(channelColumns)
    .eq("id", requestedSlug)
    .maybeSingle();
  if (q.error) throw q.error;
  if (q.data) return q.data;

  q = await sb.from("channels")
    .select(channelColumns)
    .ilike("name", requestedName)
    .limit(1)
    .maybeSingle();
  if (q.error) throw q.error;
  if (q.data) return q.data;

  const ins = await sb.from("channels")
    .insert({ id: requestedSlug, name: requestedName, created_by: me.id, is_private: false })
    .select(channelColumns)
    .single();
  if (ins.error) {
    if (ins.error.code === "23505") throw new Error("This channel is private or already exists.");
    throw ins.error;
  }
  return ins.data;
}

function updateChannelSettingsUI() {
  const settings = $("channelSettings");
  if (!currentChannel) {
    settings.classList.add("hidden");
    return;
  }

  const canManage = canManageChannel();
  $("btnShowChannelSettings").classList.toggle("hidden", !canManage);
  settings.classList.toggle("hidden", !canManage);
  $("channelSettingsInfo").textContent = `${currentChannel.is_private ? "Private" : "Public"} channel: #${currentChannel.name}`;
  $("channelRenameInput").value = currentChannel.name;
  $("channelPrivateToggle").checked = !!currentChannel.is_private;
  $("privateMemberControls").classList.toggle("hidden", !currentChannel.is_private);
  $("channelSettingsMsg").textContent = canManage ? "Admins and channel creators can rename, delete, and manage privacy." : "";
  if (canManage && currentChannel.is_private) {
    loadChannelMembers().catch(e => debugLog("channel.members.load", e));
  } else {
    $("privateMemberList").innerHTML = "";
  }
}

async function renameCurrentChannel() {
  await requireAuthedUser();
  if (!canManageChannel()) throw new Error("Only admins or the channel creator can rename this channel");
  const nextName = $("channelRenameInput").value.trim().slice(0, 64);
  if (!nextName) throw new Error("Channel name required");

  const q = await sb.from("channels")
    .update({ name: nextName })
    .eq("id", currentChannel.id)
    .select("id,name,created_by,is_private,created_at")
    .single();
  if (q.error) throw q.error;
  currentChannel = q.data;
  $("roomInput").value = currentChannel.name;
  updateChannelSettingsUI();
  await loadRooms();
}

async function deleteCurrentChannel() {
  await requireAuthedUser();
  if (!canManageChannel()) throw new Error("Only admins or the channel creator can delete this channel");
  if (!confirm(`Delete #${currentChannel.name}? This also deletes messages in the channel.`)) return;

  const channelId = currentChannel.id;
  const msgDelete = await sb.from("messages").delete().eq("room", channelId);
  if (msgDelete.error) throw msgDelete.error;
  const memberDelete = await sb.from("channel_members").delete().eq("channel_id", channelId);
  if (memberDelete.error) throw memberDelete.error;
  const channelDelete = await sb.from("channels").delete().eq("id", channelId);
  if (channelDelete.error) throw channelDelete.error;

  toast("Channel deleted", "ok");
  currentChannel = null;
  $("roomInput").value = "lobby";
  await joinRoom();
  await loadRooms();
}

async function setCurrentChannelPrivate(isPrivate) {
  await requireAuthedUser();
  if (!canManageChannel()) throw new Error("Only admins or the channel creator can change privacy");
  const q = await sb.from("channels")
    .update({ is_private: isPrivate })
    .eq("id", currentChannel.id)
    .select("id,name,created_by,is_private,created_at")
    .single();
  if (q.error) throw q.error;
  currentChannel = q.data;
  updateChannelSettingsUI();
  await loadRooms();
}

async function addPrivateMemberToCurrentChannel() {
  await requireAuthedUser();
  if (!canManageChannel()) throw new Error("Only admins or the channel creator can add users");
  if (!currentChannel?.is_private) throw new Error("Make the channel private first");
  const username = $("privateMemberUsername").value.trim();
  const userId = await getUserIdByUsername(username);
  const q = await sb.from("channel_members").insert({
    channel_id: currentChannel.id,
    user_id: userId,
    added_by: me.id
  });
  if (q.error && q.error.code !== "23505") throw q.error;
  $("privateMemberUsername").value = "";
  toast(`Added @${username} to #${currentChannel.name}`, "ok");
  await loadChannelMembers();
}

async function loadChannelMembers() {
  if (!currentChannel?.is_private || !canManageChannel()) {
    $("privateMemberList").innerHTML = "";
    return;
  }

  const q = await sb.from("channel_members")
    .select("user_id,created_at")
    .eq("channel_id", currentChannel.id)
    .order("created_at", { ascending: true });
  if (q.error) throw q.error;

  const rows = q.data || [];
  const ids = rows.map(row => row.user_id);
  let profilesById = new Map();
  if (ids.length) {
    const profiles = await sb.from("profiles")
      .select("id,username,display_name")
      .in("id", ids);
    if (profiles.error) throw profiles.error;
    profilesById = new Map((profiles.data || []).map(profile => [profile.id, profile]));
  }

  const list = $("privateMemberList");
  list.innerHTML = rows.length ? rows.map(row => {
    const profile = profilesById.get(row.user_id) || {};
    const username = profile.username || row.user_id;
    const label = profile.display_name ? `${esc(profile.display_name)} @${esc(username)}` : `@${esc(username)}`;
    return `
      <div class="list-item">
        <div>
          <div><b>${label}</b></div>
          <div class="muted">Added ${fmt(row.created_at)}</div>
        </div>
        <button class="danger" data-remove-channel-member="${esc(row.user_id)}">Remove</button>
      </div>
    `;
  }).join("") : `<div class="muted">No extra users added yet.</div>`;

  list.querySelectorAll("[data-remove-channel-member]").forEach(btn => {
    btn.onclick = async () => {
      try {
        await removePrivateMemberFromCurrentChannel(btn.getAttribute("data-remove-channel-member"));
      } catch (e) {
        $("channelSettingsMsg").textContent = errText("remove private user", e);
        debugLog("channel.member.remove", e);
      }
    };
  });
}

async function removePrivateMemberFromCurrentChannel(userId) {
  await requireAuthedUser();
  if (!canManageChannel()) throw new Error("Only admins or the channel creator can remove users");
  const q = await sb.from("channel_members")
    .delete()
    .eq("channel_id", currentChannel.id)
    .eq("user_id", userId);
  if (q.error) throw q.error;
  toast("Removed user from private channel", "ok");
  await loadChannelMembers();
}

function addAdminMenu(x, y, msg){
  const host = $("menuHost");
  host.innerHTML = "";

  const p = profileMap.get(msg.user_id) || {};
  const username = p.username || "unknown";

  const m = document.createElement("div");
  m.className = "menu";
  m.style.left = x + "px";
  m.style.top = y + "px";

  m.innerHTML = `
    <button data-act="copyuser">Copy username (@${esc(username)})</button>
    <button data-act="mute">Mute user</button>
    <button data-act="unmute">Unmute user</button>
    <button data-act="ban">Ban user</button>
    <button data-act="unban">Unban user</button>
    <button data-act="delete">Delete message</button>
  `;
  host.appendChild(m);

  m.onclick = async (e) => {
    const act = e.target.getAttribute("data-act");
    if(!act) return;

    try{
      if(act === "copyuser"){
        await navigator.clipboard.writeText(username);
        toast("Username copied", "ok");
      }

      if(act === "mute"){
        const sec = Number(prompt("Mute seconds?", "60") || 60);
        await adminMuteUser(msg.user_id, sec);
        toast(`Muted @${username} for ${sec}s`, "ok");
      }

      if(act === "unmute"){
        await adminUnmuteUser(msg.user_id);
        toast(`Unmuted @${username}`, "ok");
      }

      if(act === "ban"){
        await adminBanUser(msg.user_id);
        toast(`Banned @${username}`, "ok");
      }

      if(act === "unban"){
        await adminUnbanUser(msg.user_id);
        toast(`Unbanned @${username}`, "ok");
      }

      if(act === "delete"){
        await softDelete(msg.id);
      }
    }catch(err){
      toast(err.message || String(err), "err", 4500);
      debugLog("admin.menu.error", err);
    }

    host.innerHTML = "";
  };

  setTimeout(() => {
    document.addEventListener("click", () => host.innerHTML = "", { once:true });
  }, 0);
}
function messageHTML(m) {
  const p = profileMap.get(m.user_id) || {};
  const isAdmin = myProfile?.role === "admin";
  const canDelete = (me && m.user_id === me.id) || isAdmin;
  const canEdit = (me && m.user_id === me.id) || isAdmin;
  const avatar = p.avatar_url ? `<img class="avatar" src="${esc(p.avatar_url)}">` : "";
  const rich = m.deleted ? `<i>[deleted]</i>` : parseRich(m.text || "");
  const img = (!m.deleted && m.image_url) ? attachmentHTML(m.image_url) : "";
  const dot = isAdmin ? `<div class="admin-dot" data-dot="${m.id}">\u2026</div>` : "";

  return `<div class="msg" id="m-${m.id}">
    ${dot}
    <div class="meta"><span>${avatar}<b>${esc(p.display_name || "user")}</b> @${esc(p.username || "unknown")}</span><span>${fmt(m.created_at)}</span></div>
    <div class="body">${rich}</div>${img}
    <div class="actions">
      ${canDelete ? `<button class="ghost" data-del="${m.id}">Delete</button>` : ""}

  document.querySelectorAll("[data-del]").forEach(btn => {

async function softDelete(id) {

function getMatchedFilter(text) {
  const lc = (text || "").toLowerCase();
  return filters.find(f => f.enabled && lc.includes(f.pattern.toLowerCase()));
}

async function loadMessages() {
  await loadProfileMap();

  const q = await sb.from("messages")
    .select("id,room,user_id,text,image_url,deleted,created_at")
    .eq("room", room)
    .eq("deleted", false)
    .order("created_at", { ascending: true })
    .limit(400);

  if (q.error) throw q.error;

  const chat = $("chat");
  chat.innerHTML = "";

  const map = new Map();
  (q.data || []).forEach(m => {
    map.set(m.id, m);
    chat.insertAdjacentHTML("beforeend", messageHTML(m));
  });

  chat.querySelectorAll(".body").forEach(renderMathIn);
  wireMessageActions(map);
  chat.scrollTop = chat.scrollHeight;

async function joinRoom() {
  const requestedRoom = ($("roomInput").value.trim() || "lobby").slice(0, 64);
  const ch = await ensureChannelByInput(requestedRoom);
  const allowed = await canEnterChannel(ch);
  if (!allowed) {
    toast("This channel is private.", "err", 4500);
    return;
  }

  currentChannel = ch;
  room = ch.id;
  $("roomInput").value = ch.name;
  updateChannelSettingsUI();
  await loadMessages();
  loadRooms();

  if (channel) await sb.removeChannel(channel);

  channel = sb.channel(`room-${room}-${Date.now()}`)
    .on("postgres_changes", {
      event: "INSERT",
      schema: "public",
      table: "messages",
      filter: `room=eq.${room}`
    }, async (payload) => {
      const m = payload.new;
      if (m.deleted) return;
      if (!profileMap.has(m.user_id)) {
        const p = await sb.from("profiles")
          .select("id,username,display_name,avatar_url,role")
          .eq("id", m.user_id)
          .maybeSingle();
        if (p.data) profileMap.set(m.user_id, p.data);
      }

      const chat = $("chat");
      chat.insertAdjacentHTML("beforeend", messageHTML(m));
      const el = document.getElementById(`m-${m.id}`);
      if (el) renderMathIn(el.querySelector(".body"));

      const single = new Map();
      single.set(m.id, m);
      wireMessageActions(single);

      chat.scrollTop = chat.scrollHeight;
    })
    .on("postgres_changes", {
      event: "UPDATE",
      schema: "public",
      table: "messages",
      filter: `room=eq.${room}`
    }, async (payload) => {
      const m = payload.new;
      const old = document.getElementById(`m-${m.id}`);
      if (m.deleted) {
        if (old) old.remove();
        return;
      }
      if (old) {
        old.outerHTML = messageHTML(m);
        const ne = document.getElementById(`m-${m.id}`);
        if (ne) renderMathIn(ne.querySelector(".body"));
      }

      const single = new Map();
      single.set(m.id, m);
      wireMessageActions(single);
    })
    .on("postgres_changes", {
      event: "DELETE",
      schema: "public",
      table: "messages",
      filter: `room=eq.${room}`
    }, async (payload) => {
      const deletedId = payload.old?.id;
      if (!deletedId) return;
      const old = document.getElementById(`m-${deletedId}`);
      if (old) old.remove();
    })
    .subscribe();
}

  await requireAdmin();

  const swapIndex = index + direction;
  if (index < 0 || swapIndex < 0 || swapIndex >= channels.length) return;

async function loadRooms() {
  const q = await sb.from("channels")
    .select("id,name,created_by,is_private,created_at")
    .order("name", { ascending: true });

  if (q.error) {
    debugLog("rooms.load", q.error);
    return;
  }

      <div class="list-item">

async function editAnnouncement(id, currentTitle, currentBody) {
  const title = prompt("Edit title:", currentTitle || "");

  const body = prompt("Edit body:", currentBody || "");
  if (body === null) return;

  const q = await sb.from("announcements")
    .update({ title: title.trim(), body: body.trim() })
    .eq("id", id);

  if (q.error) throw q.error;
}

async function togglePinAnnouncement(a) {
  const nextPinned = !a.is_pinned;
  const q = await sb.from("announcements")
    .update({
      is_pinned: nextPinned,
      pinned_at: nextPinned ? new Date().toISOString() : null
    })
    .eq("id", a.id);

  if (q.error) throw q.error;
}

async function editMessage(msgId, oldText) {
  const next = prompt("Edit message:", oldText || "");
  if (next === null) return;

  const cleaned = next.trim();

  const q = await sb.from("messages")
    .update({
      text: cleaned,
      edited_at: new Date().toISOString()
    })
    .eq("id", msgId);

  if (q.error) throw q.error;
}

async function publishAnnouncement() {

  if (!title || !body) return toast("Need title and body", "warn");

  const q = await sb.from("announcements").insert({ title, body, created_by: me.id });

  $("annTitle").value = "";
  $("annBody").value = "";
  toast("Announcement published");
  await loadAnnouncements();

function renderFilterList() {
  const box = $("filterList");
  box.innerHTML = filters.map(f => `
    <div class="list-item">
      <div>
        <b>${esc(f.pattern)}</b> <span class="muted">${f.enabled ? "enabled" : "disabled"}</span>
      </div>
      <div class="row">
        <button class="ghost" data-toggle="${f.id}">${f.enabled ? "Disable" : "Enable"}</button>
        <button class="danger" data-del-filter="${f.id}">Delete</button>
      </div>
    </div>
  `).join("") || `<div class="muted">No filters.</div>`;

  box.querySelectorAll("[data-toggle]").forEach(btn => btn.onclick = async () => {
    const id = btn.getAttribute("data-toggle");
    const f = filters.find(x => x.id === id);
    if (!f) return;
    const q = await sb.from("message_filters").update({ enabled: !f.enabled }).eq("id", id);
    if (q.error) return toast(errText("toggle filter", q.error), "err");
    await loadFilters();
  });

  box.querySelectorAll("[data-del-filter]").forEach(btn => btn.onclick = async () => {
    const id = btn.getAttribute("data-del-filter");
    const q = await sb.from("message_filters").delete().eq("id", id);
    if (q.error) return toast(errText("delete filter", q.error), "err");
    await loadFilters();
  });
}

async function addFilter() {
  const pattern = $("filterInput").value.trim();
  if (!pattern) return toast("Filter text required", "warn");

  const q = await sb.from("message_filters").insert({ pattern, enabled: true, created_by: me.id });
  if (q.error) throw q.error;

  $("filterInput").value = "";
  await loadFilters();
  toast("Filter added");
}

/* admin */
async function requireAdmin() {
  if (myProfile?.role !== "admin") throw new Error("Admin only");
}

function isRootOwner() {
  return me?.email === "root@local.chat" && myProfile?.username === "root";
}

async function requireRootOwner() {
  if (!isRootOwner()) throw new Error("Root account only");
}

async function getUserProfileByUsername(username){
  const q = await sb.from("profiles")
    .select("id, username, display_name, role")
    .ilike("username", username.trim())
    .limit(1)
    .maybeSingle();

  if(q.error) throw q.error;
  if(!q.data) throw new Error("User not found");
  return q.data;
}

async function getUserIdByUsername(username){
  const profile = await getUserProfileByUsername(username);
  return profile.id;
}

async function setUserAdminRole(username, makeAdmin) {
  await requireRootOwner();
  const target = await getUserProfileByUsername(username);
  if (target.username === "root" && !makeAdmin) throw new Error("Cannot remove admin from @root");

  const q = await sb.from("profiles")
    .update({ role: makeAdmin ? "admin" : "user" })
    .eq("id", target.id);

  if (q.error) throw q.error;
  return target;
}

async function adminBanUser(userId){
  await requireAdmin();
  const q = await sb.from("user_bans").upsert({
    user_id: userId,
    reason: "instant admin ban",
    created_at: new Date().toISOString(),
    created_by: me.id
  });
  if(q.error) throw q.error;
}

async function adminMuteUser(userId, seconds=60){
  await requireAdmin();
  const muted_until = new Date(Date.now() + Math.max(1, seconds)*1000).toISOString();
  const q = await sb.from("user_mutes").upsert({
    user_id: userId,
    muted_until,
    reason: "admin mute",
    updated_at: new Date().toISOString(),
    updated_by: me.id
  });
  if(q.error) throw q.error;
}

async function adminUnmuteUser(userId){
  await requireAdmin();
  const q = await sb.from("user_mutes").delete().eq("user_id", userId);
  if(q.error) throw q.error;
}

async function adminUnbanUser(userId){
  await requireAdmin();
  const q = await sb.from("user_bans").delete().eq("user_id", userId);
  if(q.error) throw q.error;
}

/* bans edit: added replication */
async function checkBan(userId){
  if(!userId) return;

  const q = await sb.from("user_bans")
    .select("user_id")
    .eq("user_id", userId)
    .maybeSingle();

  if(q.error){
    debugLog("checkBan.error", q.error);
    return;
  }

  if(q.data){
    toast("Your account has been banned.", "err", 4500);
    await sb.auth.signOut();
    me = null;
    myProfile = null;
    showAuth();
  }
}

$("btnRegister").onclick = async () => {
  setAuthMsg("");
  try {

    if (!email || !password) return setAuthMsg("Email/password required", true);

    const r = await sb.auth.signUp({ email, password });
    if (r.error) throw r.error;

    localStorage.setItem("pending_username", $("regUsername").value.trim());
    localStorage.setItem("pending_display", $("regDisplay").value.trim());

    setAuthMsg("Registered. Login now (confirm email if required).");
    toast("Account created");
  } catch (e) {
    setAuthMsg(errText("register", e), true);
    debugLog("register", e);
  }
};

$("btnLogin").onclick = async () => {
  setAuthMsg("");
  try {
    const email = $("email").value.trim();
    const password = $("password").value;
    const r = await sb.auth.signInWithPassword({ email, password });
    if (r.error) throw r.error;

    me = r.data.user;

    // check account ban AFTER login (now we have me.id)
    const ban = await sb.from("user_bans")
      .select("user_id")
      .eq("user_id", me.id)
      .maybeSingle();

    if (ban.data) {
      await sb.auth.signOut();
      me = null;
      myProfile = null;
      showAuth();
      toast("Your account is banned.", "err", 4500);
      return;
    }

    myProfile = await ensureProfileAfterLogin(
      me,
      localStorage.getItem("pending_username") || "",
      localStorage.getItem("pending_display") || ""
    );

    localStorage.removeItem("pending_username");
    localStorage.removeItem("pending_display");

    showApp();
    await initializeChatAfterAuth();
    toast("Login success");
  } catch (e) {
    setAuthMsg(errText("login", e), true);
    debugLog("login", e);
  }
};

$("btnSend").onclick = async () => {
  try {
    const authUser = await requireAuthedUser();
    const text = $("msgText").value.trim();
    const file = $("msgFile").files?.[0];
		const mute = await sb.from("user_mutes")
  		.select("muted_until")
  		.eq("user_id", authUser.id)
  		.maybeSingle();
		if (mute.data && new Date(mute.data.muted_until).getTime() > Date.now()) {
  		const mutedUntil = new Date(mute.data.muted_until).toLocaleString();
  		toast(`Your account is muted. You are muted until ${mutedUntil}`,"warn",4500);
  		return;
		}
    if (!text && !file) return toast("Write text or attach image", "warn");

    if (currentChannel && !(await canEnterChannel(currentChannel))) {
      toast("This channel is private.", "err", 4500);
      await loadRooms();
      return;
    }

    const hit = getMatchedFilter(text);
    if (hit) return toast(`Blocked by filter: "${hit.pattern}"`, "err", 4500);

    let image_url = null;
    if (file) image_url = await uploadMedia(file);

    const ins = await sb.from("messages").insert({ room, user_id: authUser.id, text: text || null, image_url });
    if (ins.error) throw ins.error;

    $("msgText").value = "";
    $("msgFile").value = "";
    $("msgFileName").textContent = "No file chosen";
  } catch (e) {
    toast(errText("send", e), "err", 5000);
    debugLog("send", e);
  }
};

/* remember to lick and sub */
function subscribeSideChannels() {
  sb.channel("ann-live")
    .on("postgres_changes", { event: "*", schema: "public", table: "announcements" }, () => loadAnnouncements())
    .subscribe();

  sb.channel("filters-live")
    .on("postgres_changes", { event: "*", schema: "public", table: "message_filters" }, () => loadFilters())
    .subscribe();

  sb.channel("channels-live")
    .on("postgres_changes", { event: "*", schema: "public", table: "channels" }, () => loadRooms())
    .subscribe();

  sb.channel("channel-members-live")
    .on("postgres_changes", { event: "*", schema: "public", table: "channel_members" }, () => {
      loadRooms();
      if (currentChannel?.is_private && canManageChannel()) {
        loadChannelMembers().catch(e => debugLog("channel.members.live", e));
      }
    })
    .on("postgres_changes", { event: "*", schema: "public", table: "channel_members" }, () => loadRooms())
    .subscribe();

  if (me?.id) {
    sb.channel("user-bans-live")
      .on(
        "postgres_changes",
        {
          event: "*",
          schema: "public",
          table: "user_bans",
          filter: `user_id=eq.${me.id}`
        },
        () => checkBan(me.id)
      )
      .subscribe();
  }
}

(async () => {
  const s = await sb.auth.getSession();
  if (!s.data.session?.user) {
    showAuth();
    return;
  }

  try {
    me = s.data.session.user;
    myProfile = await ensureProfileAfterLogin(me);
    showApp();
    subscribeSideChannels();
    await initializeChatAfterAuth();
  } catch (e) {
    debugLog("init", e);
    showAuth();
    toast(errText("init", e), "err", 5000);
  }
})();
