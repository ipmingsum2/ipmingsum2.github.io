<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Google Fluid Playground</title>
  <style>
    :root {
      --bg: #05070c;
      --panel: rgba(9, 15, 27, 0.72);
      --panel-strong: rgba(9, 15, 27, 0.92);
      --line: rgba(255, 255, 255, 0.16);
      --text: #f8fafc;
      --muted: #a6b3c8;
      --blue: #4285f4;
      --red: #ea4335;
      --yellow: #fbbc05;
      --green: #34a853;
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
    }

    body {
      min-height: 100svh;
      background:
        radial-gradient(circle at 20% 12%, rgba(66, 133, 244, 0.28), transparent 28rem),
        radial-gradient(circle at 84% 20%, rgba(234, 67, 53, 0.22), transparent 26rem),
        radial-gradient(circle at 12% 86%, rgba(52, 168, 83, 0.2), transparent 24rem),
        radial-gradient(circle at 80% 80%, rgba(251, 188, 5, 0.18), transparent 24rem),
        #05070c;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      cursor: crosshair;
      filter: saturate(1.18) contrast(1.05);
    }

    .shell {
      position: relative;
      z-index: 2;
      min-height: 100svh;
      pointer-events: none;
      padding: max(18px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 16px;
    }

    .hero,
    .settings {
      pointer-events: auto;
      backdrop-filter: blur(18px) saturate(1.3);
      -webkit-backdrop-filter: blur(18px) saturate(1.3);
      border: 1px solid var(--line);
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.34);
    }

    .hero {
      width: min(620px, 100%);
      padding: 18px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(11, 18, 32, 0.78), rgba(11, 18, 32, 0.42));
    }

    h1 {
      margin: 0;
      font-size: clamp(2.1rem, 8vw, 5.9rem);
      line-height: 0.95;
      letter-spacing: -0.08em;
      font-weight: 900;
    }

    .g-blue { color: var(--blue); }
    .g-red { color: var(--red); }
    .g-yellow { color: var(--yellow); }
    .g-green { color: var(--green); }

    .hero p {
      max-width: 48rem;
      margin: 12px 0 0;
      color: var(--muted);
      font-size: clamp(0.95rem, 2.7vw, 1.05rem);
      line-height: 1.45;
    }

    .settings {
      align-self: flex-end;
      width: min(390px, 100%);
      max-height: min(68svh, 620px);
      overflow: auto;
      border-radius: var(--radius);
      background: var(--panel);
    }

    .settings.collapsed .settings-body { display: none; }

    .settings-header {
      position: sticky;
      top: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 13px 14px;
      background: var(--panel-strong);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .settings-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 850;
      letter-spacing: -0.02em;
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: conic-gradient(from 0deg, var(--blue), var(--red), var(--yellow), var(--green), var(--blue));
      box-shadow: 0 0 22px rgba(66, 133, 244, 0.86);
    }

    button,
    select,
    input[type="range"] {
      font: inherit;
    }

    button,
    select {
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 14px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.09);
    }

    button {
      min-height: 40px;
      padding: 9px 12px;
      cursor: pointer;
      font-weight: 800;
      transition: transform 0.16s ease, background 0.16s ease, border-color 0.16s ease;
    }

    button:hover { transform: translateY(-1px); background: rgba(255, 255, 255, 0.14); }
    button:active { transform: translateY(0); }

    .settings-body {
      display: grid;
      gap: 14px;
      padding: 14px;
    }

    .field { display: grid; gap: 7px; }

    .label-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: #dbe6ff;
      font-size: 0.86rem;
      font-weight: 800;
    }

    .value { color: var(--muted); font-variant-numeric: tabular-nums; }

    input[type="range"] {
      width: 100%;
      accent-color: var(--blue);
    }

    select {
      min-height: 42px;
      width: 100%;
      padding: 8px 10px;
      background: rgba(3, 7, 18, 0.7);
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
    }

    .primary {
      color: #06111f;
      border: none;
      background: linear-gradient(135deg, #8ab4f8, #34a853);
    }

    .danger {
      background: linear-gradient(135deg, rgba(234, 67, 53, 0.92), rgba(251, 188, 5, 0.92));
      color: #170b08;
      border: none;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.45;
    }

    @media (max-width: 720px) {
      .shell { justify-content: flex-start; }
      .hero { padding: 15px; }
      .settings {
        align-self: stretch;
        margin-top: auto;
        max-height: 54svh;
      }
      canvas { cursor: none; }
    }
  </style>
</head>
<body>
  <canvas id="fluid" aria-label="Interactive Google colored fluid canvas"></canvas>

  <main class="shell">
    <section class="hero" aria-label="Google fluid instructions">
      <h1 aria-label="Google Fluid">
        <span class="g-blue">G</span><span class="g-red">o</span><span class="g-yellow">o</span><span class="g-blue">g</span><span class="g-green">l</span><span class="g-red">e</span>
        <span>Fluid</span>
      </h1>
      <p>Move your mouse, drag, or swipe on mobile to pour color through the page. Open settings to tune the fluid feel.</p>
    </section>

    <aside class="settings" id="settingsPanel" aria-label="Fluid settings">
      <div class="settings-header">
        <div class="settings-title"><span class="status-dot" aria-hidden="true"></span> Settings</div>
        <button id="toggleSettings" type="button" aria-expanded="true">Hide</button>
      </div>
      <div class="settings-body">
        <label class="field">
          <span class="label-row"><span>Particles</span><span class="value" id="particleValue">900</span></span>
          <input id="particles" type="range" min="240" max="1800" step="60" value="900" />
        </label>
        <label class="field">
          <span class="label-row"><span>Flow strength</span><span class="value" id="forceValue">1.25</span></span>
          <input id="force" type="range" min="0.25" max="3" step="0.05" value="1.25" />
        </label>
        <label class="field">
          <span class="label-row"><span>Viscosity</span><span class="value" id="viscosityValue">0.965</span></span>
          <input id="viscosity" type="range" min="0.88" max="0.992" step="0.001" value="0.965" />
        </label>
        <label class="field">
          <span class="label-row"><span>Trail fade</span><span class="value" id="fadeValue">0.14</span></span>
          <input id="fade" type="range" min="0.035" max="0.34" step="0.005" value="0.14" />
        </label>
        <label class="field">
          <span class="label-row"><span>Blob size</span><span class="value" id="sizeValue">22</span></span>
          <input id="size" type="range" min="7" max="46" step="1" value="22" />
        </label>
        <label class="field">
          <span class="label-row"><span>Color mode</span></span>
          <select id="colorMode">
            <option value="google">Google colors</option>
            <option value="rainbow">Rainbow swirl</option>
            <option value="aurora">Aurora</option>
            <option value="fire">Fire</option>
          </select>
        </label>
        <div class="button-grid">
          <button id="splat" class="primary" type="button">Color Burst</button>
          <button id="auto" type="button">Auto: Off</button>
          <button id="calm" type="button">Calm</button>
          <button id="reset" class="danger" type="button">Reset</button>
        </div>
        <p class="hint">Tip: on phones and tablets, use one finger to steer the fluid. The page disables browser pull-to-refresh while you play.</p>
      </div>
    </aside>
  </main>

  <script>
    const canvas = document.getElementById('fluid');
    const ctx = canvas.getContext('2d', { alpha: false });
    const controls = {
      particles: document.getElementById('particles'),
      force: document.getElementById('force'),
      viscosity: document.getElementById('viscosity'),
      fade: document.getElementById('fade'),
      size: document.getElementById('size'),
      colorMode: document.getElementById('colorMode')
    };
    const values = {
      particleValue: document.getElementById('particleValue'),
      forceValue: document.getElementById('forceValue'),
      viscosityValue: document.getElementById('viscosityValue'),
      fadeValue: document.getElementById('fadeValue'),
      sizeValue: document.getElementById('sizeValue')
    };

    const palettes = {
      google: ['#4285f4', '#ea4335', '#fbbc05', '#34a853'],
      rainbow: ['#ff2d55', '#ff9500', '#ffcc00', '#34c759', '#30b0ff', '#5856d6', '#bf5af2'],
      aurora: ['#67e8f9', '#38bdf8', '#a78bfa', '#f0abfc', '#86efac'],
      fire: ['#fff7ad', '#ffd166', '#f97316', '#ef4444', '#7f1d1d']
    };

    let width = 0;
    let height = 0;
    let dpr = 1;
    let particles = [];
    let lastTime = performance.now();
    let hueSpin = 0;
    let autoPilot = false;
    const pointer = {
      x: 0,
      y: 0,
      px: 0,
      py: 0,
      vx: 0,
      vy: 0,
      active: false,
      movedAt: 0
    };

    function setting(name) {
      const element = controls[name];
      return element.type === 'range' ? Number(element.value) : element.value;
    }

    function syncLabels() {
      values.particleValue.textContent = setting('particles');
      values.forceValue.textContent = setting('force').toFixed(2);
      values.viscosityValue.textContent = setting('viscosity').toFixed(3);
      values.fadeValue.textContent = setting('fade').toFixed(3);
      values.sizeValue.textContent = setting('size');
    }

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.fillStyle = '#05070c';
      ctx.fillRect(0, 0, width, height);
      pointer.x = pointer.px = width * 0.5;
      pointer.y = pointer.py = height * 0.5;
      rebuildParticles();
    }

    function colorFor(index, offset = 0) {
      const palette = palettes[setting('colorMode')];
      return palette[(index + Math.floor(offset)) % palette.length];
    }

    function makeParticle(index) {
      const angle = Math.random() * Math.PI * 2;
      const radius = Math.sqrt(Math.random()) * Math.min(width, height) * 0.35;
      return {
        x: width * 0.5 + Math.cos(angle) * radius,
        y: height * 0.5 + Math.sin(angle) * radius,
        vx: (Math.random() - 0.5) * 1.5,
        vy: (Math.random() - 0.5) * 1.5,
        mass: 0.75 + Math.random() * 1.6,
        wobble: Math.random() * Math.PI * 2,
        colorIndex: index % palettes.google.length
      };
    }

    function rebuildParticles() {
      const target = setting('particles');
      if (particles.length > target) {
        particles.length = target;
      }
      while (particles.length < target) {
        particles.push(makeParticle(particles.length));
      }
    }

    function inject(x, y, strength = 1, burst = false) {
      const count = burst ? Math.min(220, Math.floor(particles.length * 0.16)) : Math.min(70, Math.floor(particles.length * 0.055));
      for (let i = 0; i < count; i += 1) {
        const p = particles[(Math.random() * particles.length) | 0];
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.random() * (burst ? 90 : 42);
        p.x = x + Math.cos(angle) * dist;
        p.y = y + Math.sin(angle) * dist;
        p.vx += Math.cos(angle) * (burst ? 9 : 4) * strength + pointer.vx * 0.08;
        p.vy += Math.sin(angle) * (burst ? 9 : 4) * strength + pointer.vy * 0.08;
        p.colorIndex = (hueSpin + i) % palettes[setting('colorMode')].length;
      }
    }

    function updatePointer(clientX, clientY, active = true) {
      pointer.px = pointer.x;
      pointer.py = pointer.y;
      pointer.x = clientX;
      pointer.y = clientY;
      pointer.vx = pointer.x - pointer.px;
      pointer.vy = pointer.y - pointer.py;
      pointer.active = active;
      pointer.movedAt = performance.now();
      inject(pointer.x, pointer.y, Math.max(0.45, Math.hypot(pointer.vx, pointer.vy) / 18), false);
    }

    function pointerEvent(event) {
      event.preventDefault();
      const point = event.touches ? event.touches[0] : event;
      if (!point) return;
      updatePointer(point.clientX, point.clientY, true);
    }

    window.addEventListener('pointermove', pointerEvent, { passive: false });
    window.addEventListener('pointerdown', event => {
      pointerEvent(event);
      inject(pointer.x, pointer.y, 1.8, true);
    }, { passive: false });
    window.addEventListener('pointerup', () => { pointer.active = false; });
    window.addEventListener('touchmove', pointerEvent, { passive: false });
    window.addEventListener('touchstart', pointerEvent, { passive: false });
    window.addEventListener('resize', resize);

    function autopilot(time) {
      const t = time * 0.00035;
      const x = width * (0.5 + Math.cos(t * 1.7) * 0.31 + Math.sin(t * 2.3) * 0.08);
      const y = height * (0.5 + Math.sin(t * 1.35) * 0.29 + Math.cos(t * 2.1) * 0.07);
      updatePointer(x, y, true);
    }

    function paintBackground() {
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = `rgba(5, 7, 12, ${setting('fade')})`;
      ctx.fillRect(0, 0, width, height);
    }

    function step(time) {
      const dt = Math.min(32, time - lastTime) / 16.6667;
      lastTime = time;
      hueSpin += 0.012 * dt;
      if (autoPilot || performance.now() - pointer.movedAt > 4200) autopilot(time);

      paintBackground();
      const force = setting('force');
      const viscosity = setting('viscosity');
      const baseSize = setting('size');
      const pointerSpeed = Math.hypot(pointer.vx, pointer.vy);

      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.shadowBlur = baseSize * 1.6;

      for (let i = 0; i < particles.length; i += 1) {
        const p = particles[i];
        const dx = pointer.x - p.x;
        const dy = pointer.y - p.y;
        const distSq = dx * dx + dy * dy + 80;
        const dist = Math.sqrt(distSq);
        const pull = (force * 1500 * p.mass) / distSq;
        const swirl = Math.sin(time * 0.0012 + p.wobble + dist * 0.008) * force * 0.38;
        const wake = Math.max(0.4, Math.min(2.8, pointerSpeed / 34));

        p.vx += (dx / dist) * pull * wake + (-dy / dist) * swirl;
        p.vy += (dy / dist) * pull * wake + (dx / dist) * swirl;
        p.vx += Math.sin(time * 0.001 + p.wobble) * 0.018;
        p.vy += Math.cos(time * 0.0013 + p.wobble) * 0.018;
        p.vx *= viscosity;
        p.vy *= viscosity;
        p.x += p.vx * dt;
        p.y += p.vy * dt;

        if (p.x < -80) p.x = width + 70;
        if (p.x > width + 80) p.x = -70;
        if (p.y < -80) p.y = height + 70;
        if (p.y > height + 80) p.y = -70;

        const size = baseSize * (0.38 + p.mass * 0.34) * (1 + Math.min(pointerSpeed, 80) / 220);
        const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, size);
        const color = colorFor(p.colorIndex, hueSpin);
        gradient.addColorStop(0, color);
        gradient.addColorStop(0.48, `${color}aa`);
        gradient.addColorStop(1, `${color}00`);
        ctx.shadowColor = color;
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();

      requestAnimationFrame(step);
    }

    Object.values(controls).forEach(control => {
      control.addEventListener('input', () => {
        syncLabels();
        if (control === controls.particles) rebuildParticles();
      });
    });

    document.getElementById('splat').addEventListener('click', () => inject(pointer.x, pointer.y, 2.4, true));
    document.getElementById('calm').addEventListener('click', () => {
      controls.force.value = 0.75;
      controls.viscosity.value = 0.94;
      controls.fade.value = 0.22;
      controls.size.value = 16;
      syncLabels();
    });
    document.getElementById('reset').addEventListener('click', () => {
      particles = [];
      rebuildParticles();
      ctx.fillStyle = '#05070c';
      ctx.fillRect(0, 0, width, height);
    });
    document.getElementById('auto').addEventListener('click', event => {
      autoPilot = !autoPilot;
      event.currentTarget.textContent = `Auto: ${autoPilot ? 'On' : 'Off'}`;
    });
    document.getElementById('toggleSettings').addEventListener('click', event => {
      const panel = document.getElementById('settingsPanel');
      panel.classList.toggle('collapsed');
      const expanded = !panel.classList.contains('collapsed');
      event.currentTarget.textContent = expanded ? 'Hide' : 'Show';
      event.currentTarget.setAttribute('aria-expanded', String(expanded));
    });

    syncLabels();
    resize();
    inject(width * 0.5, height * 0.52, 2.5, true);
    requestAnimationFrame(step);
  </script>
</body>
</html>
