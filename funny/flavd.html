<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fullscreen Image</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    .fullscreen-image {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
      background: #000;
    }
  </style>
</head>
<body>
  <img
    class="fullscreen-image"
    src="https://raw.githubusercontent.com/ipmingsum2/ipmingsum2.github.io/main/assets/images/Screenshot%202026-07-04%20191735.png"
    alt="Fullscreen image"
  />
</body>
</html>
