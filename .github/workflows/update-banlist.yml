name: Update Banlist

on:
  workflow_dispatch:
    inputs:
      action:
        description: "ban | unban | batch_ban"
        required: true
        type: string
      userid:
        description: "Single target userId (for ban/unban)"
        required: false
        type: string
      bannedby:
        description: "Moderator/Admin userId (for ban)"
        required: false
        type: string
      reason:
        description: "Ban reason (for ban)"
        required: false
        type: string
      username:
        description: "Username/UserId value (for ban)"
        required: false
        type: string
      batchjson:
        description: "JSON array for batch_ban"
        required: false
        type: string

permissions:
  contents: write

# IMPORTANT: use same group in Retype workflow too
concurrency:
  group: repo-write-main
  cancel-in-progress: false

jobs:
  update-banlist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure bans folder and file exist
        run: |
          mkdir -p bans
          if [ ! -f bans/banlist.json ]; then
            echo "{}" > bans/banlist.json
          fi

      - name: Apply ban/unban/batch updates
        env:
          ACTION_TYPE: ${{ github.event.inputs.action }}
          USERID: ${{ github.event.inputs.userid }}
          BANNEDBY: ${{ github.event.inputs.bannedby }}
          REASON: ${{ github.event.inputs.reason }}
          USERNAME: ${{ github.event.inputs.username }}
          BATCHJSON: ${{ github.event.inputs.batchjson }}
        run: |
          node -e "
          const fs = require('fs');
          const path = 'bans/banlist.json';

          let data = {};
          try {
            data = JSON.parse(fs.readFileSync(path, 'utf8'));
            if (typeof data !== 'object' || data === null || Array.isArray(data)) data = {};
          } catch {
            data = {};
          }

          const action = (process.env.ACTION_TYPE || '').trim();
          const now = new Date().toISOString();

          function setBan(userid, bannedby, reason, username) {
            if (!userid) return;
            data[String(userid)] = {
              bannedby: String(bannedby ?? ''),
              reason: String(reason ?? ''),
              username: String(username ?? userid),
              bannedat: now
            };
          }

          if (action === 'ban') {
            setBan(process.env.USERID, process.env.BANNEDBY, process.env.REASON, process.env.USERNAME);
          } else if (action === 'unban') {
            if (process.env.USERID) delete data[String(process.env.USERID)];
          } else if (action === 'batch_ban') {
            let arr = [];
            try {
              arr = JSON.parse(process.env.BATCHJSON || '[]');
              if (!Array.isArray(arr)) arr = [];
            } catch {
              arr = [];
            }
            for (const item of arr) {
              if (!item || typeof item !== 'object') continue;
              setBan(item.userid, item.bannedby, item.reason, item.username);
            }
          } else {
            console.error('Invalid action. Use ban | unban | batch_ban');
            process.exit(1);
          }

          fs.writeFileSync(path, JSON.stringify(data, null, 2) + '\n');
          "

      - name: Commit and push with retry
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add bans/banlist.json

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Banlist update (${{
            github.event.inputs.action
          }}) [skip retype]"

          for i in 1 2 3 4 5; do
            echo "Push attempt $i..."
            if git push origin "HEAD:${BRANCH_NAME}"; then
              echo "Push succeeded."
              exit 0
            fi

            echo "Push failed, rebasing and retrying..."
            git fetch origin "${BRANCH_NAME}"
            git rebase "origin/${BRANCH_NAME}"
          done

          echo "Failed to push after retries."
          exit 1
